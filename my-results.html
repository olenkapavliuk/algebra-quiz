<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мої результати — ALGEBRA.SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Decorative pixel background -->
  <div class="pixel-bg"></div>

  <!-- Corner brackets -->
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <!-- Navigation -->
  <nav>
    <div class="stripe-bar"></div>
    <div class="container">
      <div class="nav-inner">
        <a href="./" class="nav-logo">
          <div class="nav-logo-icon">Σ</div>
          <div>
            <span class="nav-logo-text">ALGEBRA.SYS</span>
            <span class="nav-logo-sub">◈ SIGNAL GRAPHICS V2.0 ◈</span>
          </div>
        </a>

        <ul class="nav-links">
          <li><a href="./">КАТАЛОГ</a></li>
          <li><a href="my-results.html" class="active">МОЇ РЕЗУЛЬТАТИ</a></li>
          <li><a href="leaderboard.html">РЕЙТИНГ</a></li>
          <li><a href="results.html">ДЛЯ ВЧИТЕЛЯ</a></li>
        </ul>

        <div id="authArea" class="nav-user"></div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container">

    <!-- Hero section -->
    <section class="hero">
      <div class="hero-eyebrow">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span class="sys-label">STUDENT // PROFILE</span>
      </div>
      <h1 class="hero-title">
        <span class="holo-text">МОЇ РЕЗУЛЬТАТИ</span>
      </h1>
    </section>

    <!-- User info area (filled by JS) -->
    <div id="userInfoArea"></div>

    <!-- Stats chips row (filled by JS) -->
    <div id="statsArea"></div>

    <!-- History section -->
    <div class="section-divider">
      <div class="line"></div>
      <div class="title"><span class="holo-text">ІСТОРІЯ ПРОХОДЖЕННЯ</span></div>
      <div class="line"></div>
    </div>

    <div class="card" id="historyArea">
      <p style="text-align:center; color: var(--text); padding: 40px;">Завантаження історії...</p>
    </div>

    <!-- System bar -->
    <div class="system-bar">
      <div class="sys-status">
        <div class="live-dot"></div>
        <span>STUDENT_PROFILE // АКТИВНА СЕСІЯ</span>
      </div>
      <div class="sys-right">
        <span>ALGEBRA.SYS V2.0</span>
        <span class="sys-label lime">10-А</span>
      </div>
    </div>

  </div><!-- /container -->

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    window.addEventListener('load', async () => {
      const user = Auth.getUser();
      if (!user) {
        window.location.href = './';
        return;
      }

      // Render nav auth area
      document.getElementById('authArea').innerHTML = `
        <div class="nav-avatar">${(user.name||'U')[0].toUpperCase()}</div>
        <div class="nav-username">${user.name}<span>${user.email||''}</span></div>
        <button onclick="Auth.signOut()" style="background:none;border:1px solid rgba(255,0,170,0.3);color:var(--magenta);padding:4px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:0.1em;">✕ ВИЙТИ</button>`;

      // Render user info card
      document.getElementById('userInfoArea').innerHTML = `
        <div class="card" style="display:flex; align-items:center; gap:24px; margin-bottom:24px;">
          <img src="${user.picture}" referrerpolicy="no-referrer"
            style="width:72px; height:72px; border-radius:50%; border:2px solid var(--cyan); flex-shrink:0;">
          <div>
            <div style="font-family:'Russo One',sans-serif; font-size:1.3em; color:var(--text-bright); margin-bottom:4px;">
              ${user.name}
            </div>
            <div style="font-size:0.8em; color:var(--text); letter-spacing:0.08em;">${user.email}</div>
            <span class="sys-label cyan" style="margin-top:8px; display:inline-block;">STUDENT // АКТИВНИЙ</span>
          </div>
        </div>
      `;

      const results = await API.getResultsByEmail(user.email);

      if (results.length === 0) {
        document.getElementById('historyArea').innerHTML = `
          <div style="text-align:center; padding:60px 20px; color:var(--text);">
            <div style="font-size:3em; margin-bottom:16px;">📊</div>
            <div style="font-family:'Russo One',sans-serif; font-size:1.1em; color:var(--text-bright); margin-bottom:8px;">ІСТОРІЯ ПОРОЖНЯ</div>
            <div style="font-size:0.8em; letter-spacing:0.08em;">Пройди свій перший квіз!</div>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      // Calc stats
      const totalQuizzes = new Set(results.map(r => r.quizId)).size;
      const avgScore = Math.round(results.reduce((acc, r) => acc + (r.percentage || 0), 0) / results.length);
      const totalAttempts = results.length;

      // Render stats as chips row
      document.getElementById('statsArea').innerHTML = `
        <div class="chips-row" style="margin-bottom:32px;">
          <div class="chip c-cyan">
            <span class="chip-icon">📚</span>
            <div class="chip-data">
              <span class="chip-value">${totalQuizzes}</span>
              <span class="chip-label">Теми</span>
            </div>
          </div>
          <div class="chip c-lime">
            <span class="chip-icon">🎯</span>
            <div class="chip-data">
              <span class="chip-value">${avgScore}%</span>
              <span class="chip-label">Середній бал</span>
            </div>
          </div>
          <div class="chip c-mag">
            <span class="chip-icon">⚡</span>
            <div class="chip-data">
              <span class="chip-value">${totalAttempts}</span>
              <span class="chip-label">Спроб</span>
            </div>
          </div>
        </div>
      `;

      // Render history rows inside the card
      document.getElementById('historyArea').innerHTML = results.reverse().map(r => {
        const date = new Date(r.timestamp).toLocaleDateString('uk-UA');
        const pct = r.percentage;
        const pctColor = pct >= 80 ? 'var(--lime)' : pct >= 50 ? 'var(--cyan)' : 'var(--magenta)';
        return `
          <div style="display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:20px;
                      padding:16px 0; border-bottom:1px solid var(--border-c);">
            <div>
              <div style="font-family:'Russo One',sans-serif; font-size:0.95em; color:var(--text-bright); margin-bottom:4px;">
                ${r.quizTitle}
              </div>
              <div style="font-size:0.75em; color:var(--text); letter-spacing:0.06em;">
                ${date} · ${r.score}/${r.total} вірно
              </div>
            </div>
            <div style="font-family:'Russo One',sans-serif; font-size:1.3em; color:${pctColor};
                        text-shadow:0 0 10px ${pctColor}; min-width:60px; text-align:right;">
              ${r.percentage}%
            </div>
            <span class="sys-label" style="font-size:0.65em;">
              ${r.mode === 'blitz' ? '⚡ БЛІЦ' : r.mode === 'exam' ? '📝 КОНТР.' : '📚 ТРЕНУВ.'}
            </span>
          </div>
        `;
      }).join('') + '<div style="height:8px;"></div>';

      lucide.createIcons();
    });
  </script>
</body>
</html>
