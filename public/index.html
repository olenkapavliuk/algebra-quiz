<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алгебра та початки аналізу — Квізи</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Алгебра">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Алгебра</h1>
      <p>Твій шлях до математичного дзену</p>
      <div class="auth-area" id="authArea"></div>
    </div>

    <div class="card" style="text-align: center; border-radius: 32px;">
      <img src="https://cataas.com/cat?t=welcome" alt="Welcome cat" id="catAvatar" style="width: 120px; height: 120px; border-radius: 30px; border: 2px solid var(--border-color); margin-bottom: 15px;" onerror="this.src='https://placekitten.com/160/160'">
      <div style="font-size: 1.1em; font-weight: 600;">Мяу! Готовий підкорити нову тему?</div>
      <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px;">
        <a href="leaderboard.html" style="color: var(--accent-purple); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 6px;"><i data-lucide="trophy" size="18"></i> Рейтинг</a>
        <a href="my-results.html" style="color: var(--accent-purple); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 6px;"><i data-lucide="bar-chart-2" size="18"></i> Прогрес</a>
      </div>
    </div>

    <div id="catalog"></div>
  </div>

  <script src="js/quizzes.js"></script>
  <script src="js/quizzes-extra.js"></script>
  <script src="js/quizzes-interactive.js"></script>
  <script src="js/auth.js"></script>
  <script>
    lucide.createIcons();

    window.addEventListener('load', () => {
      const user = Auth.getUser();
      const authArea = document.getElementById('authArea');
      const streakData = JSON.parse(localStorage.getItem('quiz_streak') || '{"streak":0}');
      const streakHtml = streakData.streak >= 2 ? `<div><span class="streak-bar">🔥 <strong>${streakData.streak} дні поспіль</strong></span></div>` : '';

      if (user) {
        authArea.innerHTML = Auth.profileBadgeHTML(user) + streakHtml;
      } else {
        authArea.innerHTML = '<div id="googleBtn" style="display:flex;justify-content:center;"></div>' + streakHtml;
        Auth.init(() => location.reload());
        setTimeout(() => { Auth.renderButton('googleBtn'); Auth.prompt(); }, 100);
      }
    });

    const sections = {};
    QUIZZES.forEach(q => {
      const key = q.section;
      if (!sections[key]) sections[key] = { name: q.sectionName, quizzes: [] };
      sections[key].quizzes.push(q);
    });

    const catalog = document.getElementById('catalog');
    Object.keys(sections).sort((a, b) => a - b).forEach(secNum => {
      const sec = sections[secNum];
      const group = document.createElement('div');
      group.style.marginBottom = '40px';
      group.innerHTML = `<div style="font-size: 0.9em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-purple); margin-bottom: 20px; display: flex; align-items: center; gap: 12px;">Розділ ${secNum}. ${sec.name} <div style="flex: 1; height: 1px; background: linear-gradient(to right, rgba(139, 92, 246, 0.3), transparent);"></div></div>`;

      const grid = document.createElement('div');
      grid.className = 'quiz-grid';

      sec.quizzes.forEach(quiz => {
        const progress = JSON.parse(localStorage.getItem(`progress_${quiz.id}`) || 'null');
        const card = document.createElement('a');
        card.className = 'quiz-card' + (progress ? ' done' : '');
        card.href = `quiz.html?id=${quiz.id}`;
        const doneBadge = progress ? `<span class="done-badge"><i data-lucide="check-circle-2" size="14"></i> ${progress.percentage}%</span>` : '';
        card.innerHTML = `${doneBadge}<div class="quiz-icon">${quiz.icon}</div><h3>${quiz.title}</h3><p style="color: var(--text-muted); font-size: 0.95em; margin-bottom: 20px; flex-grow: 1;">${quiz.description}</p><div style="display: flex; align-items: center; gap: 16px; font-size: 0.85em; font-weight: 600; color: var(--text-muted);"><span><i data-lucide="help-circle" size="16" style="vertical-align:middle;margin-right:4px;"></i> ${quiz.questions.length} питань</span></div>`;
        grid.appendChild(card);
      });

      group.appendChild(grid);
      catalog.appendChild(group);
      lucide.createIcons();
    });
  </script>

  <div style="text-align:center; padding: 40px 0;">
    <a href="results.html" style="color: var(--text-muted); text-decoration:none; font-size:0.8em; opacity: 0.5;">Для вчителя</a>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
