<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алгебра 10 клас — Квізи</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#302b63">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Алгебра">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg-dark: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-blue: #3b82f6;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.1) 0%, transparent 35%);
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 40px 0 20px;
    }

    .header h1 {
      font-size: 3em;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.2em;
      font-weight: 500;
    }

    .section-group {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 0.9em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-purple);
      margin-bottom: 20px;
      padding-left: 5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(139, 92, 246, 0.3), transparent);
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .quiz-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 28px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.05), transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .quiz-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .quiz-card:hover::before {
      opacity: 1;
    }

    .quiz-card.done {
      border-color: rgba(52, 211, 153, 0.2);
    }

    .done-badge {
      position: absolute;
      top: 20px; right: 20px;
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(52, 211, 153, 0.1); color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.2);
      border-radius: 12px; padding: 4px 12px;
      font-size: 0.75em; font-weight: 700;
    }

    .quiz-icon {
      width: 56px; height: 56px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .quiz-card h3 {
      color: #fff;
      font-size: 1.25em;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .quiz-card p {
      color: var(--text-muted);
      font-size: 0.95em;
      line-height: 1.5;
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .quiz-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.85em;
      font-weight: 600;
      color: var(--text-muted);
    }

    .quiz-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cat-welcome {
      text-align: center;
      margin: 20px 0 40px;
      padding: 30px;
      background: var(--card-bg);
      border-radius: 32px;
      border: 1px solid var(--border-color);
    }

    .cat-welcome img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 30px;
      border: 2px solid var(--border-color);
      margin-bottom: 15px;
    }

    .cat-welcome .cat-text {
      color: var(--text-main);
      font-size: 1.1em;
      font-weight: 600;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }

    .nav-link {
      color: var(--accent-purple);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .nav-link:hover { color: #a78bfa; }

    /* Auth styles */
    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      padding: 6px 18px 6px 6px;
      margin-bottom: 15px;
    }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-color); }
    .user-name { color: #fff; font-weight: 600; font-size: 0.95em; }
    
    .streak-bar {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 100px; padding: 6px 16px; margin-top: 8px;
      font-size: 0.9em; color: #fbbf24; font-weight: 600;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 2.2em; }
      .quiz-grid { grid-template-columns: 1fr; }
      .container { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Алгебра</h1>
      <p>Твій шлях до математичного дзену</p>
      <div class="auth-area" id="authArea"></div>
    </div>

    <div class="cat-welcome">
      <img src="https://cataas.com/cat?t=welcome" alt="Welcome cat" onerror="this.src='https://placekitten.com/160/160'">
      <div class="cat-text">Мяу! Готовий підкорити нову тему?</div>
      <div class="nav-links">
        <a href="leaderboard.html" class="nav-link"><i data-lucide="trophy" size="18"></i> Рейтинг</a>
        <a href="my-results.html" class="nav-link"><i data-lucide="bar-chart-2" size="18"></i> Прогрес</a>
      </div>
    </div>

    <div id="catalog"></div>
  </div>

  <script src="js/quizzes.js"></script>
  <script src="js/quizzes-extra.js"></script>
  <script src="js/quizzes-interactive.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    window.addEventListener('load', () => {
      const user = Auth.getUser();
      const authArea = document.getElementById('authArea');

      const streakData = JSON.parse(localStorage.getItem('quiz_streak') || '{"streak":0}');
      const streakHtml = streakData.streak >= 2
        ? `<div><span class="streak-bar">🔥 <strong>${streakData.streak} дні поспіль</strong></span></div>`
        : '';

      if (user) {
        authArea.innerHTML = Auth.profileBadgeHTML(user) + streakHtml;
      } else {
        authArea.innerHTML = '<div id="googleBtn" style="display:flex;justify-content:center;"></div>' + streakHtml;
        Auth.init(() => location.reload());
        setTimeout(() => { Auth.renderButton('googleBtn'); Auth.prompt(); }, 100);
      }
    });

    // Group quizzes by section
    const sections = {};
    QUIZZES.forEach(q => {
      const key = q.section;
      if (!sections[key]) {
        sections[key] = { name: q.sectionName, quizzes: [] };
      }
      sections[key].quizzes.push(q);
    });

    // Render catalog
    const catalog = document.getElementById('catalog');
    Object.keys(sections).sort((a, b) => a - b).forEach(secNum => {
      const sec = sections[secNum];
      const group = document.createElement('div');
      group.className = 'section-group';
      group.innerHTML = `<div class="section-title">Розділ ${secNum}. ${sec.name}</div>`;

      const grid = document.createElement('div');
      grid.className = 'quiz-grid';

      sec.quizzes.forEach(quiz => {
        const progress = JSON.parse(localStorage.getItem(`progress_${quiz.id}`) || 'null');
        const card = document.createElement('a');
        card.className = 'quiz-card' + (progress ? ' done' : '');
        card.href = `quiz.html?id=${quiz.id}`;
        
        const doneBadge = progress
          ? `<span class="done-badge"><i data-lucide="check-circle-2" size="14"></i> ${progress.percentage}%</span>`
          : '';
          
        card.innerHTML = `
          ${doneBadge}
          <div class="quiz-icon">${quiz.icon}</div>
          <h3>${quiz.title}</h3>
          <p>${quiz.description}</p>
          <div class="quiz-meta">
            <span><i data-lucide="help-circle" size="16"></i> ${quiz.questions.length} питань</span>
          </div>
        `;
        grid.appendChild(card);
      });

      group.appendChild(grid);
      catalog.appendChild(group);
      lucide.createIcons(); // Update icons for new elements
    });
  </script>

  <div style="text-align:center; padding: 40px 0;">
    <a href="results.html" style="color: var(--text-muted); text-decoration:none; font-size:0.8em; opacity: 0.5;">Для вчителя</a>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
