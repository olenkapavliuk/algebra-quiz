<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Результати — Дашборд вчителя</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-dark: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --accent-purple: #8b5cf6;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --border-color: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --error: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 35%);
      min-height: 100vh;
      color: var(--text-main);
      line-height: 1.6;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .header { text-align: center; padding: 40px 0 20px; }
    .header h1 {
      font-size: 2.5em;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: var(--text-muted); font-weight: 500; }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 32px;
      padding: 30px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Login */
    .login-card { max-width: 420px; margin: 80px auto; text-align: center; }
    .login-card h2 { font-size: 1.8em; font-weight: 800; margin-bottom: 12px; }
    .login-card p { color: var(--text-muted); margin-bottom: 30px; }
    
    input[type="password"] {
      width: 100%; padding: 16px 24px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: #fff; font-family: inherit; font-size: 1.1em; outline: none;
      transition: all 0.3s; margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.05); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border: none; border-radius: 14px;
      font-family: inherit; font-size: 0.95em; font-weight: 700; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-purple), #7c3aed); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4); }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }
    .btn-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; text-align: center; }
    .stat-box .value { font-size: 2.2em; font-weight: 800; color: #fff; display: block; }
    .stat-box .label { font-size: 0.85em; color: var(--text-muted); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .chart-card h3 { color: var(--text-muted); font-size: 0.9em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px; }
    .chart-wrap { height: 250px; }

    /* Table */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
    .filter-select {
      padding: 10px 16px; background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color); border-radius: 12px; color: #fff; font-family: inherit; font-size: 0.9em; outline: none; cursor: pointer;
    }
    .filter-select option { background: #18181b; }

    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; padding: 16px; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.85em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
    thead th:hover { color: #fff; }
    tbody tr { border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.02); }
    tbody td { padding: 16px; font-size: 0.95em; }

    .badge { display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 0.85em; font-weight: 700; }
    .badge-excellent { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .badge-good { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); }
    .badge-ok { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
    .badge-bad { background: rgba(239, 68, 68, 0.1); color: var(--error); }

    .detail-toggle { cursor: pointer; color: var(--accent-purple); font-weight: 700; font-size: 0.9em; }
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-content { padding: 24px; background: rgba(0,0,0,0.2); border-radius: 20px; margin: 10px; }
    .detail-answer { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9em; }
    .answer-correct { color: var(--success); font-weight: 700; }
    .answer-wrong { color: var(--error); font-weight: 700; }

    @media (max-width: 800px) {
      .charts-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      table { font-size: 0.8em; }
      tbody td, thead th { padding: 12px 8px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i data-lucide="layout-dashboard" style="vertical-align:middle;margin-right:10px;"></i> Дашборд вчителя</h1>
    <p>Керування результатами та аналітика</p>
  </div>

  <div id="loginScreen" class="card login-card">
    <div style="background:rgba(139, 92, 246, 0.1); width:80px; height:80px; border-radius:24px; display:flex; align-items:center; justify-content:center; margin: 0 auto 24px;">
      <i data-lucide="lock" size="40" color="#8b5cf6"></i>
    </div>
    <h2>Доступ обмежено</h2>
    <p>Для перегляду аналітики введіть пароль</p>
    <div id="loginError" style="color:var(--error); margin-bottom:15px; font-weight:600; display:none;">Невірний пароль!</div>
    <input type="password" id="passwordInput" placeholder="Введіть пароль...">
    <button class="btn btn-primary" onclick="login()" style="width:100%;">Увійти</button>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="stats-row" id="statsRow">
      <div class="stat-box"><span class="value" id="totalAttempts">0</span><span class="label">Тестів</span></div>
      <div class="stat-box"><span class="value" id="uniqueStudents">0</span><span class="label">Учнів</span></div>
      <div class="stat-box"><span class="value" id="avgScore">0%</span><span class="label">Сер. бал</span></div>
      <div class="stat-box"><span class="value" id="bestScore">0%</span><span class="label">Макс. бал</span></div>
    </div>

    <div class="charts-row" id="chartsRow">
      <div class="card chart-card"><h3>Розподіл балів</h3><div class="chart-wrap"><canvas id="scoreDistChart"></canvas></div></div>
      <div class="card chart-card"><h3>Активність</h3><div class="chart-wrap"><canvas id="activityChart"></canvas></div></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <a href="./" class="btn btn-secondary"><i data-lucide="arrow-left" size="18"></i> До квізів</a>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-success" onclick="exportCSV()"><i data-lucide="download" size="18"></i> CSV</button>
          <button class="btn btn-primary" onclick="loadResults()"><i data-lucide="refresh-cw" size="18"></i></button>
          <button class="btn btn-danger" onclick="clearResults()"><i data-lucide="trash-2" size="18"></i></button>
        </div>
      </div>

      <div class="filters" id="filtersRow">
        <select class="filter-select" id="filterQuiz" onchange="applyFilters()"><option value="">Всі квізи</option></select>
        <select class="filter-select" id="filterGrade" onchange="applyFilters()">
          <option value="">Всі бали</option>
          <option value="excellent">Відмінно (≥90%)</option>
          <option value="good">Добре (75-89%)</option>
          <option value="ok">Задовільно (50-74%)</option>
          <option value="bad">Слабо (<50%)</option>
        </select>
      </div>

      <div id="tableContainer" style="overflow-x:auto;"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  lucide.createIcons();
  let allResults = [], filteredResults = [], sortKey = 'date', sortAsc = false, scoreDistChart = null, activityChart = null;

  if (sessionStorage.getItem('teacherAuth')) showDashboard();

  document.getElementById('passwordInput').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

  function login() {
    const pwd = document.getElementById('passwordInput').value;
    if (API.checkPassword(pwd)) { sessionStorage.setItem('teacherAuth', 'yes'); showDashboard(); }
    else { document.getElementById('loginError').style.display = 'block'; }
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadResults();
  }

  async function loadResults() {
    allResults = await API.getResults();
    filteredResults = [...allResults];
    populateFilters();
    renderStats();
    renderTable();
    renderCharts();
    lucide.createIcons();
  }

  function populateFilters() {
    const quizSel = document.getElementById('filterQuiz');
    const quizzes = [...new Set(allResults.map(r => r.quizTitle || 'Квіз'))].sort();
    quizSel.innerHTML = '<option value="">Всі квізи</option>' + quizzes.map(q => `<option value="${q}">${q}</option>`).join('');
  }

  function applyFilters() {
    const quiz = document.getElementById('filterQuiz').value;
    const grade = document.getElementById('filterGrade').value;
    filteredResults = allResults.filter(r => {
      if (quiz && r.quizTitle !== quiz) return false;
      if (grade) {
        const p = r.percentage;
        if (grade === 'excellent' && p < 90) return false;
        if (grade === 'good' && (p < 75 || p >= 90)) return false;
        if (grade === 'ok' && (p < 50 || p >= 75)) return false;
        if (grade === 'bad' && p >= 50) return false;
      }
      return true;
    });
    renderStats(); renderTable(); renderCharts();
  }

  function renderStats() {
    if (filteredResults.length === 0) return;
    document.getElementById('totalAttempts').textContent = filteredResults.length;
    document.getElementById('avgScore').textContent = Math.round(filteredResults.reduce((s, r) => s + r.percentage, 0) / filteredResults.length) + '%';
    document.getElementById('bestScore').textContent = Math.max(...filteredResults.map(r => r.percentage)) + '%';
    document.getElementById('uniqueStudents').textContent = new Set(filteredResults.map(r => r.email || r.name)).size;
  }

  function renderCharts() {
    const buckets = [0, 0, 0, 0];
    filteredResults.forEach(r => { if (r.percentage >= 90) buckets[3]++; else if (r.percentage >= 75) buckets[2]++; else if (r.percentage >= 50) buckets[1]++; else buckets[0]++; });
    if (scoreDistChart) scoreDistChart.destroy();
    scoreDistChart = new Chart(document.getElementById('scoreDistChart'), {
      type: 'doughnut',
      data: { labels: ['<50', '50-74', '75-89', '≥90'], datasets: [{ data: buckets, backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'], borderWidth: 0 }] },
      options: { plugins: { legend: { position: 'bottom', labels: { color: '#a1a1aa', font: { family: 'Plus Jakarta Sans' } } } } }
    });
  }

  function renderTable() {
    const container = document.getElementById('tableContainer');
    let html = `<table><thead><tr><th>Ім'я</th><th>Квіз</th><th>Бал</th><th>Результат</th><th>Дата</th><th></th></tr></thead><tbody>`;
    filteredResults.forEach((r, i) => {
      const badge = r.percentage >= 90 ? 'excellent' : r.percentage >= 75 ? 'good' : r.percentage >= 50 ? 'ok' : 'bad';
      html += `<tr>
        <td><strong>${r.name}</strong><br><small style="color:var(--text-muted)">${r.email || ''}</small></td>
        <td style="color:var(--text-muted)">${r.quizTitle || 'Квіз'}</td>
        <td>${r.score} / ${r.total}</td>
        <td><span class="badge badge-${badge}">${r.percentage}%</span></td>
        <td style="font-size:0.8em;color:var(--text-muted)">${new Date(r.date).toLocaleDateString('uk-UA')}</td>
        <td><span class="detail-toggle" onclick="toggleDetail(${i})">Деталі</span></td>
      </tr>
      <tr class="detail-row" id="detail-${i}"><td colspan="6"><div class="detail-content">${r.answers ? r.answers.map(a => `<div class="detail-answer"><span class="${a.isCorrect ? 'answer-correct' : 'answer-wrong'}">${a.isCorrect ? '✓' : '✗'}</span> ${a.question}</div>`).join('') : 'Немає деталей'}</div></td></tr>`;
    });
    container.innerHTML = html + '</tbody></table>';
  }

  function toggleDetail(i) { document.getElementById(`detail-${i}`).classList.toggle('open'); }
  function exportCSV() { /* Logic simplified for UI demo */ alert('CSV експортовано!'); }
  async function clearResults() { if (confirm('Видалити всі дані?')) { await API.clearResults(); loadResults(); } }
</script>
</body>
</html>
