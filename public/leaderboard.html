<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рейтинг — Алгебра</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-dark: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-gold: #f59e0b;
      --accent-silver: #94a3b8;
      --accent-bronze: #b45309;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.08) 0%, transparent 35%);
      min-height: 100vh;
      color: var(--text-main);
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 40px 0 20px;
    }

    .header h1 {
      font-size: 2.5em;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1em;
      font-weight: 500;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 600;
      margin-bottom: 20px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent-purple); }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 32px;
      padding: 30px;
      margin-bottom: 24px;
    }

    /* Podium */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 16px;
      margin: 40px 0;
      min-height: 240px;
    }

    .podium-place {
      text-align: center;
      border-radius: 24px 24px 16px 16px;
      padding: 24px 16px 20px;
      min-width: 140px;
      position: relative;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      transition: transform 0.3s;
    }

    .podium-place:hover { transform: translateY(-5px); }

    .podium-place.first {
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.02));
      border-color: rgba(245, 158, 11, 0.3);
      min-height: 220px;
      order: 2;
      z-index: 2;
    }
    .podium-place.second {
      background: linear-gradient(180deg, rgba(148, 163, 184, 0.1), rgba(148, 163, 184, 0.02));
      border-color: rgba(148, 163, 184, 0.2);
      min-height: 180px;
      order: 1;
    }
    .podium-place.third {
      background: linear-gradient(180deg, rgba(180, 83, 9, 0.1), rgba(180, 83, 9, 0.02));
      border-color: rgba(180, 83, 9, 0.2);
      min-height: 150px;
      order: 3;
    }

    .podium-medal { font-size: 2.5em; margin-bottom: 12px; display: block; }
    .podium-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      margin: 0 auto 12px; display: block;
      border: 3px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
    .podium-name { color: #fff; font-weight: 700; font-size: 1em; margin-bottom: 4px; }
    .podium-score { color: var(--text-muted); font-size: 0.85em; font-weight: 600; }

    /* Table */
    .leader-row {
      display: flex; align-items: center; gap: 20px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.2s;
    }
    .leader-row:last-child { border-bottom: none; }

    .leader-rank {
      width: 36px; height: 36px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.9em; color: var(--text-muted);
      flex-shrink: 0;
    }
    .leader-rank.top1 { background: rgba(245, 158, 11, 0.1); color: var(--accent-gold); }
    .leader-rank.top2 { background: rgba(148, 163, 184, 0.1); color: var(--accent-silver); }
    .leader-rank.top3 { background: rgba(180, 83, 9, 0.1); color: var(--accent-bronze); }

    .leader-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border-color);
    }
    .leader-info { flex: 1; }
    .leader-name { color: #fff; font-weight: 700; font-size: 1em; }
    .leader-meta { color: var(--text-muted); font-size: 0.85em; margin-top: 2px; }

    .leader-score { text-align: right; }
    .leader-avg { font-size: 1.4em; font-weight: 800; color: #fff; line-height: 1; }
    .leader-label { font-size: 0.75em; color: var(--text-muted); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    .leader-highlight {
      background: rgba(139, 92, 246, 0.05);
      border-radius: 20px;
      padding: 16px 16px;
      margin: 0 -16px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }

    @media (max-width: 600px) {
      .podium { min-height: 200px; gap: 8px; margin: 20px 0; }
      .podium-place { min-width: 100px; padding: 16px 8px; }
      .podium-medal { font-size: 1.8em; }
      .podium-avatar { width: 48px; height: 48px; }
      .leader-row { gap: 12px; }
      .leader-avg { font-size: 1.2em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="./" class="back-link"><i data-lucide="arrow-left" size="18"></i> Всі квізи</a>
    <div class="header">
      <h1>Зал слави</h1>
      <p>Найкращі математики нашого класу</p>
    </div>
    <div id="content"><p style="text-align:center; color: var(--text-muted); padding: 40px;">Завантаження рейтингу...</p></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script>
  lucide.createIcons();

  window.addEventListener('load', async () => {
    const content = document.getElementById('content');
    const currentUser = Auth.getUser();

    const allResults = await API.getResults();
    const leaderboard = buildLeaderboard(allResults);

    if (leaderboard.length === 0) {
      content.innerHTML = '<div class="empty"><i data-lucide="award" size="48" style="margin-bottom:16px;opacity:0.5;"></i><h3>Поки що тут порожньо</h3><p>Стань першим, хто пройде квіз!</p></div>';
      lucide.createIcons();
      return;
    }

    let html = '';

    // Podium
    if (leaderboard.length >= 1) {
      const medals = ['🥇', '🥈', '🥉'];
      const classes = ['first', 'second', 'third'];
      const top3 = leaderboard.slice(0, 3);

      html += '<div class="podium">';
      const podiumOrder = top3.length >= 3 ? [1, 0, 2] : top3.length >= 2 ? [1, 0] : [0];
      podiumOrder.forEach(i => {
        if (top3[i]) {
          const s = top3[i];
          html += `
            <div class="podium-place ${classes[i]}">
              <span class="podium-medal">${medals[i]}</span>
              ${s.picture ? `<img src="${s.picture}" class="podium-avatar" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : `<div class="podium-avatar" style="background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text-muted);font-weight:800;">${s.name[0]}</div>`}
              <div class="podium-name">${s.name}</div>
              <div class="podium-score">${s.avgScore}%</div>
            </div>`;
        }
      });
      html += '</div>';
    }

    // List
    html += '<div class="card">';
    leaderboard.forEach((s, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      const isMe = currentUser && currentUser.email && s.email.toLowerCase() === currentUser.email.toLowerCase();

      html += `
        <div class="leader-row ${isMe ? 'leader-highlight' : ''}">
          <div class="leader-rank ${rankClass}">${i + 1}</div>
          ${s.picture ? `<img src="${s.picture}" class="leader-avatar" referrerpolicy="no-referrer" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%23334%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2216%22>${s.name[0]}</text></svg>'">` : `<div class="leader-avatar" style="background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-weight:700;">${s.name[0]}</div>`}
          <div class="leader-info">
            <div class="leader-name">${s.name}${isMe ? ' <span style="font-weight:500;opacity:0.7;">(це ти)</span>' : ''}</div>
            <div class="leader-meta">${s.quizCount} квізів · ${s.totalAttempts} спроб</div>
          </div>
          <div class="leader-score">
            <div class="leader-avg">${s.avgScore}%</div>
            <div class="leader-label">Середній</div>
          </div>
        </div>`;
    });
    html += '</div>';

    content.innerHTML = html;
    lucide.createIcons();
  });
  </script>
</body>
</html>
