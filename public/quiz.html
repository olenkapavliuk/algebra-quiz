<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квіз — ALGEBRA.SYS</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#05050f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Алгебра">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- KaTeX for beautiful math formulas -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Decorative pixel background -->
  <div class="pixel-bg"></div>

  <!-- Corner brackets -->
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <!-- Navigation -->
  <nav>
    <div class="stripe-bar cyan-stripe"></div>
    <div class="container">
      <div class="nav-inner">
        <a href="./" class="nav-logo">
          <div class="nav-logo-icon">Σ</div>
          <div>
            <span class="nav-logo-text">ALGEBRA.SYS</span>
            <span class="nav-logo-sub">◈ SIGNAL GRAPHICS V2.0 ◈</span>
          </div>
        </a>
        <a href="./" class="back-link" style="margin:0;">
          <i data-lucide="arrow-left" size="16"></i> КАТАЛОГ
        </a>
        <div class="sound-toggle" onclick="toggleSoundUI()" title="Звук" id="soundToggle">
          <i data-lucide="volume-2" size="18"></i>
        </div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top: 32px;">

    <!-- Quiz header -->
    <div class="header">
      <h1 id="quizTitle">КВІЗ</h1>
      <p id="quizDescription"></p>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome" class="card">
      <div class="info-box">
        <h3 id="quizInfoTitle">ТЕМА:</h3>
        <p id="quizInfoDesc" style="color: var(--text); margin: 0; font-size: 0.9em;"></p>
      </div>
      <div id="theoryToggleWrap"></div>
      <div class="theory-block" id="theoryBlock"></div>
      <div id="modeSelect" style="margin-bottom:30px; display:none;">
        <p style="color: var(--text); font-size:0.78em; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:12px; text-align:left;">РЕЖИМ ПРОХОДЖЕННЯ:</p>
        <div class="mode-select">
          <div class="mode-card selected" data-mode="training" onclick="selectMode('training')">
            <span class="mode-icon">📚</span>
            <div class="mode-name">ТРЕНУВАННЯ</div>
            <div class="mode-desc">Підказки та спокій</div>
          </div>
          <div class="mode-card" data-mode="exam" onclick="selectMode('exam')">
            <span class="mode-icon">📝</span>
            <div class="mode-name">КОНТРОЛЬНА</div>
            <div class="mode-desc">15 хв на все</div>
          </div>
          <div class="mode-card" data-mode="blitz" onclick="selectMode('blitz')">
            <span class="mode-icon">⚡</span>
            <div class="mode-name">БЛІЦ</div>
            <div class="mode-desc">30 сек на питання</div>
          </div>
          <div class="mode-card disabled" id="retryModeCard" data-mode="retry" onclick="selectMode('retry')">
            <span class="mode-icon">🔄</span>
            <div class="mode-name">ПОМИЛКИ</div>
            <div class="mode-desc" id="retryDesc">Пусто</div>
          </div>
        </div>
        <p style="color: var(--text); font-size:0.78em; letter-spacing:0.1em; text-transform:uppercase; margin-top:20px; margin-bottom:10px; text-align:left;">СКЛАДНІСТЬ:</p>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="sys-label difficulty-btn difficulty-easy" onclick="selectDifficulty('easy')" data-diff="easy" style="cursor:pointer;">ЛЕГКИЙ — 5 питань</button>
          <button class="sys-label difficulty-btn difficulty-standard active-diff-standard" onclick="selectDifficulty('standard')" data-diff="standard" style="cursor:pointer;">СТАНДАРТ — всі питання</button>
          <button class="sys-label difficulty-btn difficulty-hard" onclick="selectDifficulty('hard')" data-diff="hard" style="cursor:pointer;">ХАРД — без підказок</button>
        </div>
      </div>
      <div id="loginArea" style="margin-bottom: 24px;"></div>
      <button class="btn btn-primary" onclick="startQuiz()" id="startBtn" style="display:none;">
        ПОЧАТИ КВІЗ <i data-lucide="play" size="16"></i>
      </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz" class="card" style="display:none;">
      <div class="question-counter">
        <span id="questionNum"></span>
        <span id="timer" style="color:var(--cyan);"><i data-lucide="clock" size="14" style="vertical-align:middle;margin-right:4px;"></i> 0:00</span>
      </div>
      <div class="progress-wrapper">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
      <div id="blitzTimerWrap" class="blitz-timer-wrap" style="display:none;">
        <span class="blitz-seconds" id="blitzSeconds">30</span>
      </div>
      <div class="question-text" id="questionText"></div>
      <div id="hintArea"></div>
      <div class="options" id="options"></div>
      <div id="explanationBox"></div>
      <div class="next-btn-wrap" id="nextBtnWrap" style="display:none; text-align:center; margin-top:30px;">
        <button class="btn btn-primary" onclick="nextQuestion()">ДАЛІ <i data-lucide="arrow-right" size="16"></i></button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results" class="card" style="display:none;"></div>

    <!-- System bar -->
    <div class="system-bar">
      <div class="sys-status">
        <div class="live-dot"></div>
        <span>QUIZ.MODULE // АКТИВНИЙ</span>
      </div>
      <div class="sys-right">
        <span style="color: var(--cyan);">KATEX // MATH ENGINE</span>
        <span style="color: var(--lime);">◈ V2.0</span>
      </div>
    </div>

  </div>

  <script src="js/quizzes.js"></script>
  <script src="js/quizzes-extra.js"></script>
  <script src="js/quizzes-interactive.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/sounds.js"></script>
  <script>
    lucide.createIcons();

    function toggleSoundUI() {
      const isOn = Sound.toggle();
      const icon = document.getElementById('soundToggle');
      icon.innerHTML = isOn ? '<i data-lucide="volume-2" size="18"></i>' : '<i data-lucide="volume-x" size="18"></i>';
      lucide.createIcons();
    }

    const correctCatMessages = ['Мурр! Бездоганно!', 'Котик пишається тобою!', 'Ти розумніший за кота!', 'Мяу! Так тримати!', 'Цей кіт аплодує тобі!', 'Геній математики!'];
    const wrongCatMessages = ['Кіт вірить в тебе!', 'Мяу... Не здавайся!', 'Цей кіт теж плутає формули...', 'Нічого! Кіт підтримує!', 'Кіт каже: помилки — це ОК!'];
    const resultCatMessages = {
      excellent: ['Кіт коронує тебе!', 'Кіт в шоці від геніальності!', 'Мурр! Ти легенда!'],
      good: ['Кіт задоволений! Майже ідеально!', 'Хороший результат!', 'Ще трішки і буде відмінно!'],
      ok: ['Непогано, але є куди рости!', 'Кіт вірить — ти можеш краще!'],
      bad: ['Кіт обіймає! Повтори теорію!', 'Не сумуй!']
    };

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function getCatUrl() { return `https://cataas.com/cat?t=${Date.now()}-${Math.random()}`; }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderMath(el) {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(el || document.body, {
          delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
          throwOnError: false
        });
      }
    }

    const THEORY = {
      '3-7-addition': { title: 'Формули додавання та пониження степеня', items: ['$\\sin(\\alpha + \\beta) = \\sin\\alpha\\cos\\beta + \\cos\\alpha\\sin\\beta$', '$\\cos^2\\alpha = \\dfrac{1 + \\cos 2\\alpha}{2}$'] },
      '3-8-double-angle': { title: 'Формули подвійного аргументу', items: ['$\\sin 2\\alpha = 2\\sin\\alpha\\cos\\alpha$', '$\\cos 2\\alpha = \\cos^2\\alpha - \\sin^2\\alpha$'] },
      '3-5-identities': { title: 'Основні тригонометричні тотожності', items: ['$\\sin^2\\alpha + \\cos^2\\alpha = 1$', '$\\operatorname{tg}\\alpha \\cdot \\operatorname{ctg}\\alpha = 1$'] },
      '5-3-derivative-concept': { title: 'Основні похідні', items: ["$(x^n)' = nx^{n-1}$", "$(\\sin x)' = \\cos x$"] }
    };

    const params = new URLSearchParams(window.location.search);
    const quizId = params.get('id');
    const quizData = QUIZZES.find(q => q.id === quizId);

    if (!quizData) {
      document.querySelector('.container').innerHTML = `<div style="text-align:center; padding: 60px 20px;"><h2 style="font-family:'Russo One',sans-serif;color:var(--magenta);">КВІЗ НЕ ЗНАЙДЕНО</h2><a href="./" class="btn btn-primary" style="margin-top:20px;">← ДО КАТАЛОГУ</a></div>`;
    } else {
      document.getElementById('quizTitle').textContent = quizData.title;
      document.getElementById('quizDescription').textContent = quizData.sectionName;
      document.getElementById('quizInfoTitle').textContent = quizData.title;
      document.getElementById('quizInfoDesc').textContent = quizData.description;
      document.title = `${quizData.title} — ALGEBRA.SYS`;
    }

    function buildPreparedQuestions(questions, count) {
      const s = shuffle([...questions]);
      const sel = count ? s.slice(0, Math.min(count, s.length)) : s;
      return sel.map(q => {
        const type = q.type || 'choice';
        if (['text_input', 'true_false', 'matching', 'fill_blanks', 'ordering'].includes(type)) return { ...q, type };
        const correctAnswer = q.options[q.correct];
        const shuffledOptions = shuffle(q.options);
        return { ...q, type, options: shuffledOptions, correct: shuffledOptions.indexOf(correctAnswer) };
      });
    }

    let preparedQuestions = [], currentQuestion = 0, score = 0, answers = [], startTime, timerInterval, studentName = '', studentUser = null, hintUsed = false, quizMode = 'training', blitzInterval = null, blitzTimeLeft = 30, difficulty = 'standard';
    const BLITZ_TIME = 30, EXAM_MINUTES = 15;
    let lastResult = {};

    if (quizData && THEORY[quizData.id]) {
      const t = THEORY[quizData.id];
      document.getElementById('theoryToggleWrap').innerHTML = `<div class="theory-toggle" onclick="document.getElementById('theoryBlock').classList.toggle('open'); this.textContent = this.textContent.includes('ПЕРЕГЛЯНУТИ') ? '▲ СХОВАТИ ТЕОРІЮ' : '📖 ПЕРЕГЛЯНУТИ ТЕОРІЮ'">📖 ПЕРЕГЛЯНУТИ ТЕОРІЮ</div>`;
      document.getElementById('theoryBlock').innerHTML = `<h4>${t.title}</h4><ul>${t.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    }

    window.addEventListener('load', () => {
      setTimeout(() => renderMath(), 100);
      if (!quizData) return;
      const user = Auth.getUser();
      if (user) {
        studentName = user.name; studentUser = user;
        document.getElementById('loginArea').innerHTML = `<div class="user-badge"><img src="${user.picture}" class="user-avatar" referrerpolicy="no-referrer"><span class="user-name">${user.name}</span></div>`;
        document.getElementById('startBtn').style.display = 'inline-flex';
        document.getElementById('modeSelect').style.display = 'block';
        const mistakesCount = JSON.parse(localStorage.getItem(`mistakes_${quizId}`) || '[]').length;
        if (mistakesCount > 0) {
          document.getElementById('retryModeCard').classList.remove('disabled');
          document.getElementById('retryDesc').textContent = `Повтори ${mistakesCount} помилок`;
        }
      } else {
        document.getElementById('loginArea').innerHTML = '<p style="margin-bottom:15px;color:var(--text);font-size:0.85em;letter-spacing:0.05em;">Увійди, щоб зберегти прогрес</p><div id="googleBtn" style="display:flex;justify-content:center;"></div>';
        Auth.init(() => location.reload());
        setTimeout(() => { Auth.renderButton('googleBtn'); Auth.prompt(); }, 200);
      }
    });

    function selectMode(mode) {
      if (mode === 'retry' && document.getElementById('retryModeCard').classList.contains('disabled')) return;
      quizMode = mode;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-mode="${mode}"]`).classList.add('selected');
      Sound.click();
    }

    function selectDifficulty(diff) {
      difficulty = diff;
      // Remove active classes from all difficulty buttons
      document.querySelectorAll('.difficulty-btn').forEach(b => {
        b.classList.remove('active-diff-easy', 'active-diff-standard', 'active-diff-hard');
      });
      // Add active class to selected button
      document.querySelector(`[data-diff="${diff}"]`).classList.add(`active-diff-${diff}`);
      Sound.click();
    }

    function startBlitzTimer() {
      blitzTimeLeft = BLITZ_TIME; updateBlitzDisplay();
      document.getElementById('blitzTimerWrap').style.display = 'block';
      blitzInterval = setInterval(() => {
        blitzTimeLeft--; updateBlitzDisplay();
        if (blitzTimeLeft <= 0) { clearInterval(blitzInterval); autoTimeoutAnswer(); }
      }, 1000);
    }

    function updateBlitzDisplay() {
      const el = document.getElementById('blitzSeconds');
      if (el) { el.textContent = blitzTimeLeft; el.className = 'blitz-seconds' + (blitzTimeLeft <= 10 ? ' warning' : ''); }
    }

    function autoTimeoutAnswer() {
      document.querySelectorAll('.option, .blank-option, .matching-item, .ordering-item').forEach(el => el.style.pointerEvents = 'none');
      showFeedback(false, 'Час вийшов!');
      answers.push({ question: preparedQuestions[currentQuestion].question, selected: '—', correct: 'Час вийшов', isCorrect: false });
    }

    function startQuiz() {
      if (quizMode === 'training') preparedQuestions = buildPreparedQuestions(quizData.questions, null);
      else if (quizMode === 'exam') preparedQuestions = buildPreparedQuestions(quizData.examQuestions || quizData.questions, null);
      else if (quizMode === 'blitz') {
        // Blitz: use dedicated blitzQuestions if available, otherwise fall back
        const pool = (quizData.blitzQuestions && quizData.blitzQuestions.length >= 5)
          ? quizData.blitzQuestions
          : quizData.questions;
        preparedQuestions = buildPreparedQuestions(pool, 10);
      }
      else if (quizMode === 'retry') {
        const stored = JSON.parse(localStorage.getItem(`mistakes_${quizId}`) || '[]');
        preparedQuestions = buildPreparedQuestions(quizData.questions.filter(q => stored.includes(q.question)), null);
      }
      // Apply difficulty: easy = only first 5 questions after shuffle
      if (difficulty === 'easy' && preparedQuestions.length > 5) {
        preparedQuestions = preparedQuestions.slice(0, 5);
      }
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('quiz').style.display = 'block';
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000);
      showQuestion();
      lucide.createIcons();
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const min = Math.floor(elapsed / 60), sec = elapsed % 60;
      document.getElementById('timer').innerHTML = `<i data-lucide="clock" size="14"></i> ${min}:${sec.toString().padStart(2, '0')}`;
      lucide.createIcons();
    }

    function showQuestion() {
      const q = preparedQuestions[currentQuestion];
      const total = preparedQuestions.length;
      document.getElementById('questionNum').textContent = `ПИТАННЯ ${currentQuestion + 1} / ${total}`;
      document.getElementById('progressFill').style.width = `${(currentQuestion / total) * 100}%`;

      const badges = { true_false: 'badge-tf', text_input: 'badge-input', matching: 'badge-matching', fill_blanks: 'badge-fill', ordering: 'badge-order' };
      const labels = { true_false: 'ПРАВДА ЧИ БРЕХНЯ', text_input: 'ВВЕДИ ВІДПОВІДЬ', matching: 'ВСТАНОВИ ВІДПОВІДНІСТЬ', fill_blanks: 'ЗАПОВНИ ПРОПУСКИ', ordering: 'РОЗСТАВ ПО ЧЕРЗІ' };

      let badgeHtml = q.type ? `<span class="q-type-badge ${badges[q.type]}">${labels[q.type]}</span><br>` : '';
      document.getElementById('questionText').innerHTML = badgeHtml + q.question;

      const optionsEl = document.getElementById('options');
      optionsEl.classList.remove('tf-options');
      optionsEl.innerHTML = '';

      if (q.type === 'text_input') {
        optionsEl.innerHTML = `<div class="text-input-wrap"><input type="text" id="textAnswer" placeholder="Твоя відповідь..."><button class="btn-check" onclick="checkTextAnswer()">ПЕРЕВІРИТИ</button></div><div id="correctAnswerShow"></div>`;
      } else if (q.type === 'matching') { renderMatching(q, optionsEl); }
      else if (q.type === 'fill_blanks') { renderFillBlanks(q, optionsEl); }
      else if (q.type === 'ordering') { renderOrdering(q, optionsEl); }
      else {
        if (q.type === 'true_false') optionsEl.classList.add('tf-options');
        optionsEl.innerHTML = q.options.map((opt, i) => `<div class="option" onclick="selectAnswer(${i})" id="opt${i}">${opt}</div>`).join('');
      }

      document.getElementById('explanationBox').innerHTML = '';
      document.getElementById('nextBtnWrap').style.display = 'none';
      if (quizMode === 'training') document.getElementById('hintArea').innerHTML = `<button class="theory-toggle" style="margin-top:10px" onclick="showHint()">💡 ПІДКАЗКА</button>`;
      else document.getElementById('hintArea').innerHTML = '';

      if (quizMode === 'blitz') { if (blitzInterval) clearInterval(blitzInterval); startBlitzTimer(); }
      setTimeout(() => renderMath(document.getElementById('quiz')), 10);
    }

    function showHint() {
      if (difficulty === 'hard') {
        document.getElementById('hintArea').innerHTML = `<div class="explanation wrong-exp" style="margin-top:10px">⛔ ХАРД: підказки недоступні</div>`;
        return;
      }
      const q = preparedQuestions[currentQuestion];
      document.getElementById('hintArea').innerHTML = `<div class="explanation correct-exp" style="margin-top:10px">💡 ${q.hint || 'Подумай ще раз!'}</div>`;
      renderMath(document.getElementById('hintArea'));
    }

    function showFeedback(isCorrect, explanation) {
      if (isCorrect) Sound.correct(); else Sound.wrong();
      const catMsg = isCorrect ? rand(correctCatMessages) : rand(wrongCatMessages);
      document.getElementById('explanationBox').innerHTML = `<div class="explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'}"><strong>${isCorrect ? '✓ СУПЕР!' : '✗ ОЙ...'}</strong> ${explanation}</div><div class="cat-meme"><img src="${getCatUrl()}"><div class="cat-caption ${isCorrect ? 'correct-cat' : 'wrong-cat'}">${catMsg}</div></div>`;
      document.getElementById('nextBtnWrap').style.display = 'block';
      lucide.createIcons();
      renderMath(document.getElementById('explanationBox'));
    }

    function selectAnswer(index) {
      const q = preparedQuestions[currentQuestion];
      const isCorrect = index === q.correct;
      if (blitzInterval) clearInterval(blitzInterval);
      document.querySelectorAll('.option').forEach(el => el.classList.add('disabled'));
      if (isCorrect) { document.getElementById(`opt${index}`).classList.add('correct'); score++; }
      else { document.getElementById(`opt${index}`).classList.add('wrong'); document.getElementById(`opt${q.correct}`).classList.add('show-correct'); }
      answers.push({ question: q.question, selected: q.options[index], correct: q.options[q.correct], isCorrect });
      showFeedback(isCorrect, q.explanation);
    }

    function checkTextAnswer() {
      const q = preparedQuestions[currentQuestion];
      const inp = document.getElementById('textAnswer');
      const val = inp.value.trim();
      if (blitzInterval) clearInterval(blitzInterval);
      const isCorrect = (Array.isArray(q.correct) ? q.correct : [q.correct]).some(c => c.toLowerCase().replace(/\s/g,'') === val.toLowerCase().replace(/\s/g,''));
      if (isCorrect) { inp.classList.add('input-correct'); score++; }
      else { inp.classList.add('input-wrong'); document.getElementById('correctAnswerShow').innerHTML = `<div class="correct-answer-show">Правильно: ${Array.isArray(q.correct) ? q.correct[0] : q.correct}</div>`; }
      answers.push({ question: q.question, selected: val, correct: Array.isArray(q.correct) ? q.correct[0] : q.correct, isCorrect });
      showFeedback(isCorrect, q.explanation);
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < preparedQuestions.length) showQuestion();
      else showResults();
    }

    function showConfetti() {
      const container = document.createElement('div'); container.className = 'confetti-container'; document.body.appendChild(container);
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div'); p.className = 'confetti-piece'; p.style.left = Math.random()*200-100+'px';
        p.style.background = `hsl(${Math.random()*360}, 70%, 60%)`; container.appendChild(p);
      }
      setTimeout(() => container.remove(), 2000);
    }

    async function showResults() {
      clearInterval(timerInterval);
      const total = preparedQuestions.length, percentage = Math.round((score/total)*100);
      document.getElementById('quiz').style.display = 'none';
      const resultsDiv = document.getElementById('results');
      resultsDiv.style.display = 'block';
      Sound.complete();
      if (percentage >= 70) showConfetti();

      let grade = percentage >= 90 ? 'ВІДМІННО!' : percentage >= 70 ? 'ДОБРЕ!' : percentage >= 50 ? 'ЗАДОВІЛЬНО' : 'СПРОБУЙ ЩЕ!';
      resultsDiv.innerHTML = `
        <div class="score-circle"><span class="score-num">${score}/${total}</span><span class="score-label">${percentage}%</span></div>
        <div class="grade-text">${grade}</div>
        <div class="result-cat"><img src="${getCatUrl()}"></div>
        <div class="results-details">
          <div class="detail-box"><div class="value">${score}</div><div class="label">ВІРНО</div></div>
          <div class="detail-box"><div class="value">${total-score}</div><div class="label">ПОМИЛОК</div></div>
          <div class="detail-box"><div class="value">${percentage}%</div><div class="label">УСПІХ</div></div>
        </div>
        <div class="results-buttons">
          <button class="btn btn-primary" onclick="location.reload()">ЩЕ РАЗ</button>
          <a href="./" class="btn btn-secondary">ДО КАТАЛОГУ</a>
        </div>
      `;
      lucide.createIcons();
      // Update streak
      const today = new Date().toDateString();
      const streakData = JSON.parse(localStorage.getItem('quiz_streak') || '{"streak":0,"lastDate":""}');
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (streakData.lastDate === today) {
        // already counted today
      } else if (streakData.lastDate === yesterday) {
        streakData.streak += 1;
        streakData.lastDate = today;
      } else {
        streakData.streak = 1;
        streakData.lastDate = today;
      }
      localStorage.setItem('quiz_streak', JSON.stringify(streakData));

      const elapsed = Math.round((Date.now() - startTime) / 1000);
      const user = Auth.getUser();
      if (user) {
        API.saveResult({
          name: user.name,
          email: user.email,
          picture: user.picture || '',
          quizId,
          quizTitle: quizData ? quizData.title : quizId,
          score,
          total,
          percentage,
          mode: quizMode,
          timeSpent: elapsed
        });
      }

      // Add share button
      const shareText = `${quizData ? quizData.title : 'Квіз'}: ${percentage}% (${score}/${total}) — ALGEBRA.SYS`;
      const shareBtn = document.createElement('button');
      shareBtn.className = 'btn btn-secondary';
      shareBtn.textContent = '📤 ПОДІЛИТИСЯ';
      shareBtn.onclick = () => {
        if (navigator.share) {
          navigator.share({ title: 'ALGEBRA.SYS', text: shareText, url: location.href });
        } else {
          navigator.clipboard.writeText(shareText).then(() => alert('Скопійовано в буфер!'));
        }
      };
      resultsDiv.querySelector('.results-buttons').appendChild(shareBtn);
    }
  </script>
</body>
</html>
