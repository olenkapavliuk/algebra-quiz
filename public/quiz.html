<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квіз — Алгебра 10 клас</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#302b63">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Алгебра">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- KaTeX for beautiful math formulas -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg-dark: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-blue: #3b82f6;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --border-color: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --error: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.1) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.08) 0%, transparent 35%);
      min-height: 100vh;
      color: var(--text-main);
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 40px 0 20px;
    }

    .header h1 {
      font-size: 2.5em;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 1.1em;
      font-weight: 500;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9em;
      font-weight: 600;
      margin-bottom: 20px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent-purple); }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 32px;
      padding: 40px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #welcome { text-align: center; }
    #welcome h2 { font-size: 1.8em; font-weight: 700; margin-bottom: 24px; color: #fff; }

    .info-box {
      background: rgba(139, 92, 246, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.1);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 30px;
      text-align: left;
    }

    .info-box h3 { color: var(--accent-purple); margin-bottom: 8px; font-size: 1.2em; font-weight: 700; }

    input[type="text"] {
      width: 100%;
      max-width: 400px;
      padding: 16px 24px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-family: inherit;
      font-size: 1.1em;
      outline: none;
      transition: all 0.3s;
    }

    input[type="text"]:focus { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.05); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 40px;
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
      color: #fff;
      box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(139, 92, 246, 0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .progress-wrapper {
      margin-bottom: 30px;
    }

    .progress-bar {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      height: 10px;
      overflow: hidden;
      border: 1px solid var(--border-color);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink));
      border-radius: 100px;
      transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .question-counter {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.9em;
      font-weight: 600;
      color: var(--text-muted);
    }

    .question-text {
      font-size: 1.4em;
      font-weight: 700;
      color: #fff;
      margin-bottom: 30px;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option {
      padding: 20px 24px;
      border: 2px solid var(--border-color);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      font-size: 1.1em;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(4px);
    }

    .option.correct {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.1);
      color: #fff;
    }

    .option.wrong {
      border-color: var(--error);
      background: rgba(239, 68, 68, 0.1);
    }

    .option.show-correct {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.05);
    }

    .option.disabled { pointer-events: none; }

    .explanation {
      margin-top: 30px;
      padding: 24px;
      border-radius: 20px;
      font-size: 1em;
      line-height: 1.6;
      font-weight: 500;
      animation: fadeIn 0.4s ease;
    }

    .explanation.correct-exp {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }

    .explanation.wrong-exp {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .cat-meme {
      text-align: center;
      margin-top: 25px;
    }

    .cat-meme img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 24px;
      border: 2px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .cat-meme .cat-caption {
      margin-top: 12px;
      font-size: 1.1em;
      font-weight: 700;
    }

    .cat-caption.correct-cat { color: var(--success); }
    .cat-caption.wrong-cat { color: #fca5a5; }

    .matching-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 15px;
      align-items: start;
    }

    .matching-left, .matching-right {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .matching-arrows {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding-top: 4px;
    }

    .matching-item {
      padding: 16px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      font-size: 1em;
      font-weight: 500;
      min-height: 60px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .matching-item.left-item { cursor: pointer; }
    .matching-item.left-item:hover { border-color: var(--accent-purple); }
    .matching-item.left-item.selected { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.1); }
    .matching-item.right-item { cursor: pointer; }
    .matching-item.right-item:hover { border-color: var(--accent-purple); }
    .matching-item.matched { opacity: 0.4; pointer-events: none; border-style: dashed; }
    .matching-item.match-correct { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
    .matching-item.match-wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }

    .match-line { color: var(--accent-purple); font-size: 0.8em; }
    .match-pair-display { padding: 10px 0; font-size: 0.95em; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }

    .fill-blank-text { font-size: 1.25em; line-height: 2.2; color: #fff; }
    .blank-slot {
      display: inline-block;
      min-width: 90px;
      padding: 4px 16px;
      border: 2px dashed rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.03);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      vertical-align: middle;
      margin: 2px 6px;
      min-height: 38px;
    }
    .blank-slot:hover { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.08); }
    .blank-slot.filled { border-style: solid; border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.12); color: #fff; }
    .blank-slot.slot-correct { border-color: var(--success); background: rgba(16, 185, 129, 0.08); }
    .blank-slot.slot-wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.08); }

    .blank-options { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px; }
    .blank-option {
      padding: 10px 20px;
      border: 2px solid var(--border-color);
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1em;
      font-weight: 500;
      color: var(--text-main);
    }
    .blank-option:hover { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.08); }
    .blank-option.used { opacity: 0.2; pointer-events: none; }

    .ordering-list { display: flex; flex-direction: column; gap: 12px; }
    .ordering-item {
      padding: 18px 24px;
      border: 2px solid var(--border-color);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.02);
      cursor: grab;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
      user-select: none;
      font-size: 1.1em;
      font-weight: 500;
    }
    .ordering-item:active { cursor: grabbing; }
    .ordering-item:hover { border-color: rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05); }
    .ordering-item.dragging { opacity: 0.5; border-color: var(--accent-purple); }
    .ordering-item.drag-over { border-color: var(--accent-purple); border-style: dashed; }
    .ordering-item.order-correct { border-color: var(--success); background: rgba(16, 185, 129, 0.08); }
    .ordering-item.order-wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.08); }
    .ordering-handle { color: var(--text-muted); font-size: 1.4em; }
    .ordering-num {
      width: 28px; height: 28px;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent-purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9em; font-weight: 800;
      flex-shrink: 0;
    }

    #results { text-align: center; }
    .score-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin: 0 auto 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 3.5em;
      font-weight: 800;
      position: relative;
      background: var(--card-bg);
      border: 8px solid rgba(255,255,255,0.05);
    }
    .score-circle .score-num { color: #fff; }
    .score-circle .score-label { font-size: 0.3em; color: var(--text-muted); font-weight: 500; margin-top: -5px; }
    .grade-text { font-size: 1.8em; margin-bottom: 12px; font-weight: 800; letter-spacing: -0.01em; }

    .result-cat { text-align: center; margin: 30px 0; }
    .result-cat img { width: 240px; height: 240px; object-fit: cover; border-radius: 32px; border: 3px solid var(--border-color); }

    .results-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 30px 0; }
    .detail-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; text-align: center; }
    .detail-box .value { font-size: 1.6em; font-weight: 800; color: #fff; }
    .detail-box .label { font-size: 0.85em; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

    .results-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.2); }

    .review-section { margin-top: 40px; text-align: left; }
    .review-section h3 { text-align: center; margin-bottom: 24px; color: var(--text-main); font-weight: 800; }
    .review-item {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      border-left: 6px solid;
    }
    .review-item.review-correct { border-left-color: var(--success); }
    .review-item.review-wrong { border-left-color: var(--error); }
    .review-question { font-weight: 700; margin-bottom: 10px; color: #fff; font-size: 1.1em; }
    .review-answer { font-size: 1em; color: var(--text-muted); line-height: 1.6; }
    .review-answer span { font-weight: 700; }
    .green { color: var(--success); }
    .red { color: var(--error); }

    .tf-options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .tf-options .option { justify-content: center; font-size: 1.2em; font-weight: 700; }

    .text-input-wrap { display: flex; gap: 14px; align-items: center; }
    .text-input-wrap input {
      flex: 1; padding: 16px 24px; border: 2px solid var(--border-color);
      border-radius: 18px; background: rgba(255, 255, 255, 0.03);
      color: #fff; font-size: 1.1em; outline: none; transition: all 0.3s; font-family: inherit;
    }
    .text-input-wrap input:focus { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.05); }
    .text-input-wrap input.input-correct { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
    .text-input-wrap input.input-wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.05); }
    .btn-check {
      padding: 16px 30px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
      color: #fff; font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.3s; white-space: nowrap;
    }
    .btn-check:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4); }

    .correct-answer-show {
      margin-top: 15px; padding: 16px 20px; background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 16px; color: #6ee7b7; font-size: 1em;
    }

    .q-type-badge {
      display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 0.8em; font-weight: 700;
      margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .q-type-badge.badge-tf { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
    .q-type-badge.badge-input { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
    .q-type-badge.badge-matching { background: rgba(139, 92, 246, 0.1); color: #a78bfa; }
    .q-type-badge.badge-fill { background: rgba(249, 115, 22, 0.1); color: #fb923c; }
    .q-type-badge.badge-order { background: rgba(20, 184, 166, 0.1); color: #2dd4bf; }

    .theory-toggle {
      display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px;
      padding: 12px 24px; border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 14px; background: rgba(139, 92, 246, 0.05);
      color: var(--accent-purple); cursor: pointer; font-size: 0.95em; font-weight: 700; transition: all 0.2s;
    }
    .theory-toggle:hover { background: rgba(139, 92, 246, 0.1); border-color: var(--accent-purple); }
    .theory-block {
      display: none; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color);
      border-radius: 24px; padding: 30px; margin-bottom: 30px; text-align: left;
      animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .theory-block.open { display: block; }
    .theory-block h4 { color: var(--accent-purple); margin-bottom: 12px; font-size: 1.1em; font-weight: 700; }
    .theory-block ul { list-style: none; padding: 0; }
    .theory-block li { padding: 6px 0; color: var(--text-muted); font-size: 1em; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .theory-block li:last-child { border-bottom: none; }

    .sound-toggle {
      position: fixed; top: 20px; right: 20px; background: var(--card-bg);
      border: 1px solid var(--border-color); border-radius: 16px; width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: all 0.2s;
    }
    .sound-toggle:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.2); }

    .mode-select { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 30px; }
    .mode-card {
      padding: 20px 16px; border: 2px solid var(--border-color); border-radius: 20px;
      background: rgba(255, 255, 255, 0.02); cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); text-align: center;
    }
    .mode-card:hover { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.05); transform: translateY(-4px); }
    .mode-card.selected { border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.1); box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.2); }
    .mode-icon { font-size: 2em; display: block; margin-bottom: 8px; }
    .mode-name { font-weight: 700; color: #fff; font-size: 1em; }
    .mode-desc { color: var(--text-muted); font-size: 0.8em; margin-top: 6px; line-height: 1.4; }

    .blitz-timer-wrap { margin-bottom: 20px; text-align: center; }
    .blitz-seconds { font-size: 2.5em; font-weight: 800; color: var(--success); }
    .blitz-seconds.warning { color: var(--error); }

    .user-badge {
      display: inline-flex; align-items: center; gap: 12px; background: var(--card-bg);
      border: 1px solid var(--border-color); border-radius: 100px; padding: 6px 18px 6px 6px;
    }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border-color); }
    .user-name { color: #fff; font-weight: 600; font-size: 0.95em; }
    .streak-bar {
      display: inline-flex; align-items: center; gap: 8px; background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 100px; padding: 6px 16px;
      margin-top: 12px; font-size: 0.9em; color: #fbbf24; font-weight: 700;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    .anim-bounce { animation: bounceIn 0.5s ease; }
    .anim-shake { animation: shakeX 0.5s ease; }
    .anim-correct { animation: bounceIn 0.4s ease; }

    .confetti-container { position: fixed; top: 50%; left: 50%; pointer-events: none; z-index: 1000; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confetti 1.5s ease-out forwards; }

    .katex { color: var(--text-main); }

    @media (max-width: 600px) {
      .header h1 { font-size: 2em; }
      .card { padding: 24px; }
      .results-details { grid-template-columns: 1fr; }
      .mode-select { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sound-toggle" onclick="toggleSoundUI()" title="Звук" id="soundToggle">
      <i data-lucide="volume-2" size="20"></i>
    </div>
    <a href="./" class="back-link"><i data-lucide="arrow-left" size="18"></i> Всі квізи</a>

    <div class="header">
      <h1 id="quizTitle">Квіз</h1>
      <p id="quizDescription"></p>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome" class="card">
      <h2>Готовий перевірити знання?</h2>
      <div class="info-box">
        <h3 id="quizInfoTitle">Тема:</h3>
        <p id="quizInfoDesc" style="color: var(--text-muted); margin: 0;"></p>
      </div>
      <div id="theoryToggleWrap"></div>
      <div class="theory-block" id="theoryBlock"></div>
      <div id="modeSelect" style="margin-bottom:30px; display:none;">
        <p style="color: var(--text-muted); font-size:0.9em; font-weight:600; margin-bottom:12px; text-align:left;">Режим проходження:</p>
        <div class="mode-select">
          <div class="mode-card selected" data-mode="training" onclick="selectMode('training')">
            <span class="mode-icon">📚</span>
            <div class="mode-name">Тренування</div>
            <div class="mode-desc">Підказки та спокій</div>
          </div>
          <div class="mode-card" data-mode="exam" onclick="selectMode('exam')">
            <span class="mode-icon">📝</span>
            <div class="mode-name">Контрольна</div>
            <div class="mode-desc">15 хв на все</div>
          </div>
          <div class="mode-card" data-mode="blitz" onclick="selectMode('blitz')">
            <span class="mode-icon">⚡</span>
            <div class="mode-name">Бліц</div>
            <div class="mode-desc">30 сек на питання</div>
          </div>
          <div class="mode-card disabled" id="retryModeCard" data-mode="retry" onclick="selectMode('retry')">
            <span class="mode-icon">🔄</span>
            <div class="mode-name">Помилки</div>
            <div class="mode-desc" id="retryDesc">Пусто</div>
          </div>
        </div>
      </div>
      <div id="loginArea" style="margin-bottom: 24px;"></div>
      <button class="btn btn-primary" onclick="startQuiz()" id="startBtn" style="display:none;">
        Почати квіз <i data-lucide="play" size="18"></i>
      </button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz" class="card" style="display:none;">
      <div class="question-counter">
        <span id="questionNum"></span>
        <span id="timer"><i data-lucide="clock" size="14" style="vertical-align:middle;margin-right:4px;"></i> 0:00</span>
      </div>
      <div class="progress-wrapper">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
      <div id="blitzTimerWrap" class="blitz-timer-wrap" style="display:none;">
        <span class="blitz-seconds" id="blitzSeconds">30</span>
      </div>
      <div class="question-text" id="questionText"></div>
      <div id="hintArea"></div>
      <div class="options" id="options"></div>
      <div id="explanationBox"></div>
      <div class="next-btn-wrap" id="nextBtnWrap" style="display:none; text-align:center; margin-top:30px;">
        <button class="btn btn-primary" onclick="nextQuestion()">Далі <i data-lucide="arrow-right" size="18"></i></button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results" class="card" style="display:none;"></div>
  </div>

  <script src="js/quizzes.js"></script>
  <script src="js/quizzes-extra.js"></script>
  <script src="js/quizzes-interactive.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/sounds.js"></script>
  <script>
    lucide.createIcons();

    function toggleSoundUI() {
      const isOn = Sound.toggle();
      const icon = document.getElementById('soundToggle');
      icon.innerHTML = isOn ? '<i data-lucide="volume-2" size="20"></i>' : '<i data-lucide="volume-x" size="20"></i>';
      lucide.createIcons();
    }

    const correctCatMessages = ['Мурр! Бездоганно!', 'Котик пишається тобою!', 'Ти розумніший за кота!', 'Мяу! Так тримати!', 'Цей кіт аплодує тобі!', 'Геній математики!'];
    const wrongCatMessages = ['Кіт вірить в тебе!', 'Мяу... Не здавайся!', 'Цей кіт теж плутає формули...', 'Нічого! Кіт підтримує!', 'Кіт каже: помилки — це ОК!'];
    const resultCatMessages = {
      excellent: ['Кіт коронує тебе!', 'Кіт в шоці від геніальності!', 'Мурр! Ти легенда!'],
      good: ['Кіт задоволений! Майже ідеально!', 'Хороший результат!', 'Ще трішки і буде відмінно!'],
      ok: ['Непогано, але є куди рости!', 'Кіт вірить — ти можеш краще!'],
      bad: ['Кіт обіймає! Повтори теорію!', 'Не сумуй!']
    };

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function getCatUrl() { return `https://cataas.com/cat?t=${Date.now()}-${Math.random()}`; }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function renderMath(el) {
      if (typeof renderMathInElement === 'function') {
        renderMathInElement(el || document.body, {
          delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
          throwOnError: false
        });
      }
    }

    const THEORY = {
      '3-7-addition': { title: 'Формули додавання та пониження степеня', items: ['$\\sin(\\alpha + \\beta) = \\sin\\alpha\\cos\\beta + \\cos\\alpha\\sin\\beta$', '$\\cos^2\\alpha = \\dfrac{1 + \\cos 2\\alpha}{2}$'] },
      '3-8-double-angle': { title: 'Формули подвійного аргументу', items: ['$\\sin 2\\alpha = 2\\sin\\alpha\\cos\\alpha$', '$\\cos 2\\alpha = \\cos^2\\alpha - \\sin^2\\alpha$'] },
      '3-5-identities': { title: 'Основні тригонометричні тотожності', items: ['$\\sin^2\\alpha + \\cos^2\\alpha = 1$', '$\\operatorname{tg}\\alpha \\cdot \\operatorname{ctg}\\alpha = 1$'] },
      '5-3-derivative-concept': { title: 'Основні похідні', items: ["$(x^n)' = nx^{n-1}$", "$(\\sin x)' = \\cos x$"] }
    };

    const params = new URLSearchParams(window.location.search);
    const quizId = params.get('id');
    const quizData = QUIZZES.find(q => q.id === quizId);

    if (!quizData) {
      document.querySelector('.container').innerHTML = `<div style="text-align:center; padding: 60px 20px;"><h2>Квіз не знайдено</h2><a href="./" class="btn btn-primary">← До каталогу</a></div>`;
    } else {
      document.getElementById('quizTitle').textContent = quizData.title;
      document.getElementById('quizDescription').textContent = quizData.sectionName;
      document.getElementById('quizInfoTitle').textContent = quizData.title;
      document.getElementById('quizInfoDesc').textContent = quizData.description;
      document.title = `${quizData.title} — Квіз`;
    }

    function buildPreparedQuestions(questions, count) {
      const s = shuffle([...questions]);
      const sel = count ? s.slice(0, Math.min(count, s.length)) : s;
      return sel.map(q => {
        const type = q.type || 'choice';
        if (['text_input', 'true_false', 'matching', 'fill_blanks', 'ordering'].includes(type)) return { ...q, type };
        const correctAnswer = q.options[q.correct];
        const shuffledOptions = shuffle(q.options);
        return { ...q, type, options: shuffledOptions, correct: shuffledOptions.indexOf(correctAnswer) };
      });
    }

    let preparedQuestions = [], currentQuestion = 0, score = 0, answers = [], startTime, timerInterval, studentName = '', studentUser = null, hintUsed = false, quizMode = 'training', blitzInterval = null, blitzTimeLeft = 30;
    const BLITZ_TIME = 30, EXAM_MINUTES = 15;
    let lastResult = {};

    if (quizData && THEORY[quizData.id]) {
      const t = THEORY[quizData.id];
      document.getElementById('theoryToggleWrap').innerHTML = `<div class="theory-toggle" onclick="document.getElementById('theoryBlock').classList.toggle('open'); this.textContent = this.textContent.includes('Переглянути') ? '▲ Сховати теорію' : '📖 Переглянути теорію'">📖 Переглянути теорію</div>`;
      document.getElementById('theoryBlock').innerHTML = `<h4>${t.title}</h4><ul>${t.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    }

    window.addEventListener('load', () => {
      setTimeout(() => renderMath(), 100);
      if (!quizData) return;
      const user = Auth.getUser();
      if (user) {
        studentName = user.name; studentUser = user;
        document.getElementById('loginArea').innerHTML = `<div class="user-badge"><img src="${user.picture}" class="user-avatar" referrerpolicy="no-referrer"><span class="user-name">${user.name}</span></div>`;
        document.getElementById('startBtn').style.display = 'inline-flex';
        document.getElementById('modeSelect').style.display = 'block';
        const mistakesCount = JSON.parse(localStorage.getItem(`mistakes_${quizId}`) || '[]').length;
        if (mistakesCount > 0) {
          document.getElementById('retryModeCard').classList.remove('disabled');
          document.getElementById('retryDesc').textContent = `Повтори ${mistakesCount} помилок`;
        }
      } else {
        document.getElementById('loginArea').innerHTML = '<p style="margin-bottom:15px;color:var(--text-muted);">Увійди, щоб зберегти прогрес</p><div id="googleBtn" style="display:flex;justify-content:center;"></div>';
        Auth.init(() => location.reload());
        setTimeout(() => { Auth.renderButton('googleBtn'); Auth.prompt(); }, 200);
      }
    });

    function selectMode(mode) {
      if (mode === 'retry' && document.getElementById('retryModeCard').classList.contains('disabled')) return;
      quizMode = mode;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-mode="${mode}"]`).classList.add('selected');
      Sound.click();
    }

    function startBlitzTimer() {
      blitzTimeLeft = BLITZ_TIME; updateBlitzDisplay();
      document.getElementById('blitzTimerWrap').style.display = 'block';
      blitzInterval = setInterval(() => {
        blitzTimeLeft--; updateBlitzDisplay();
        if (blitzTimeLeft <= 0) { clearInterval(blitzInterval); autoTimeoutAnswer(); }
      }, 1000);
    }

    function updateBlitzDisplay() {
      const el = document.getElementById('blitzSeconds');
      if (el) { el.textContent = blitzTimeLeft; el.className = 'blitz-seconds' + (blitzTimeLeft <= 10 ? ' warning' : ''); }
    }

    function autoTimeoutAnswer() {
      document.querySelectorAll('.option, .blank-option, .matching-item, .ordering-item').forEach(el => el.style.pointerEvents = 'none');
      showFeedback(false, 'Час вийшов!');
      answers.push({ question: preparedQuestions[currentQuestion].question, selected: '—', correct: 'Час вийшов', isCorrect: false });
    }

    function startQuiz() {
      if (quizMode === 'training') preparedQuestions = buildPreparedQuestions(quizData.questions, null);
      else if (quizMode === 'exam') preparedQuestions = buildPreparedQuestions(quizData.examQuestions || quizData.questions, null);
      else if (quizMode === 'blitz') preparedQuestions = buildPreparedQuestions(quizData.questions, 10);
      else if (quizMode === 'retry') {
        const stored = JSON.parse(localStorage.getItem(`mistakes_${quizId}`) || '[]');
        preparedQuestions = buildPreparedQuestions(quizData.questions.filter(q => stored.includes(q.question)), null);
      }
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('quiz').style.display = 'block';
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 1000);
      showQuestion();
      lucide.createIcons();
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const min = Math.floor(elapsed / 60), sec = elapsed % 60;
      document.getElementById('timer').innerHTML = `<i data-lucide="clock" size="14"></i> ${min}:${sec.toString().padStart(2, '0')}`;
      lucide.createIcons();
    }

    function showQuestion() {
      const q = preparedQuestions[currentQuestion];
      const total = preparedQuestions.length;
      document.getElementById('questionNum').textContent = `Питання ${currentQuestion + 1} / ${total}`;
      document.getElementById('progressFill').style.width = `${(currentQuestion / total) * 100}%`;
      
      const badges = { true_false: 'badge-tf', text_input: 'badge-input', matching: 'badge-matching', fill_blanks: 'badge-fill', ordering: 'badge-order' };
      const labels = { true_false: 'Правда чи брехня', text_input: 'Введи відповідь', matching: 'Встанови відповідність', fill_blanks: 'Заповни пропуски', ordering: 'Розстав по черзі' };
      
      let badgeHtml = q.type ? `<span class="q-type-badge ${badges[q.type]}">${labels[q.type]}</span><br>` : '';
      document.getElementById('questionText').innerHTML = badgeHtml + q.question;

      const optionsEl = document.getElementById('options');
      optionsEl.classList.remove('tf-options');
      optionsEl.innerHTML = '';

      if (q.type === 'text_input') {
        optionsEl.innerHTML = `<div class="text-input-wrap"><input type="text" id="textAnswer" placeholder="Твоя відповідь..."><button class="btn-check" onclick="checkTextAnswer()">Перевірити</button></div><div id="correctAnswerShow"></div>`;
      } else if (q.type === 'matching') { renderMatching(q, optionsEl); }
      else if (q.type === 'fill_blanks') { renderFillBlanks(q, optionsEl); }
      else if (q.type === 'ordering') { renderOrdering(q, optionsEl); }
      else {
        if (q.type === 'true_false') optionsEl.classList.add('tf-options');
        optionsEl.innerHTML = q.options.map((opt, i) => `<div class="option" onclick="selectAnswer(${i})" id="opt${i}">${opt}</div>`).join('');
      }

      document.getElementById('explanationBox').innerHTML = '';
      document.getElementById('nextBtnWrap').style.display = 'none';
      if (quizMode === 'training') document.getElementById('hintArea').innerHTML = `<button class="theory-toggle" style="margin-top:10px" onclick="showHint()">💡 Підказка</button>`;
      else document.getElementById('hintArea').innerHTML = '';
      
      if (quizMode === 'blitz') { if (blitzInterval) clearInterval(blitzInterval); startBlitzTimer(); }
      setTimeout(() => renderMath(document.getElementById('quiz')), 10);
    }

    function showHint() {
      const q = preparedQuestions[currentQuestion];
      document.getElementById('hintArea').innerHTML = `<div class="explanation correct-exp" style="margin-top:10px">💡 ${q.hint || 'Подумай ще раз!'}</div>`;
      renderMath(document.getElementById('hintArea'));
    }

    function showFeedback(isCorrect, explanation) {
      if (isCorrect) Sound.correct(); else Sound.wrong();
      const catMsg = isCorrect ? rand(correctCatMessages) : rand(wrongCatMessages);
      document.getElementById('explanationBox').innerHTML = `<div class="explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'}"><strong>${isCorrect ? '✓ Супер!' : '✗ Ой...'}</strong> ${explanation}</div><div class="cat-meme"><img src="${getCatUrl()}"><div class="cat-caption ${isCorrect ? 'correct-cat' : 'wrong-cat'}">${catMsg}</div></div>`;
      document.getElementById('nextBtnWrap').style.display = 'block';
      lucide.createIcons();
      renderMath(document.getElementById('explanationBox'));
    }

    function selectAnswer(index) {
      const q = preparedQuestions[currentQuestion];
      const isCorrect = index === q.correct;
      if (blitzInterval) clearInterval(blitzInterval);
      document.querySelectorAll('.option').forEach(el => el.classList.add('disabled'));
      if (isCorrect) { document.getElementById(`opt${index}`).classList.add('correct'); score++; }
      else { document.getElementById(`opt${index}`).classList.add('wrong'); document.getElementById(`opt${q.correct}`).classList.add('show-correct'); }
      answers.push({ question: q.question, selected: q.options[index], correct: q.options[q.correct], isCorrect });
      showFeedback(isCorrect, q.explanation);
    }

    function checkTextAnswer() {
      const q = preparedQuestions[currentQuestion];
      const inp = document.getElementById('textAnswer');
      const val = inp.value.trim();
      if (blitzInterval) clearInterval(blitzInterval);
      const isCorrect = (Array.isArray(q.correct) ? q.correct : [q.correct]).some(c => c.toLowerCase().replace(/\s/g,'') === val.toLowerCase().replace(/\s/g,''));
      if (isCorrect) { inp.classList.add('input-correct'); score++; }
      else { inp.classList.add('input-wrong'); document.getElementById('correctAnswerShow').innerHTML = `<div class="correct-answer-show">Правильно: ${Array.isArray(q.correct) ? q.correct[0] : q.correct}</div>`; }
      answers.push({ question: q.question, selected: val, correct: Array.isArray(q.correct) ? q.correct[0] : q.correct, isCorrect });
      showFeedback(isCorrect, q.explanation);
    }

    // Simplified Matching, Fill Blanks, Ordering logic placeholders (re-use interactive.js logic)
    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < preparedQuestions.length) showQuestion();
      else showResults();
    }

    function showConfetti() {
      const container = document.createElement('div'); container.className = 'confetti-container'; document.body.appendChild(container);
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div'); p.className = 'confetti-piece'; p.style.left = Math.random()*200-100+'px';
        p.style.background = `hsl(${Math.random()*360}, 70%, 60%)`; container.appendChild(p);
      }
      setTimeout(() => container.remove(), 2000);
    }

    async function showResults() {
      clearInterval(timerInterval);
      const total = preparedQuestions.length, percentage = Math.round((score/total)*100);
      document.getElementById('quiz').style.display = 'none';
      const resultsDiv = document.getElementById('results');
      resultsDiv.style.display = 'block';
      Sound.complete();
      if (percentage >= 70) showConfetti();

      let grade = percentage >= 90 ? 'Відмінно!' : percentage >= 70 ? 'Добре!' : percentage >= 50 ? 'Задовільно' : 'Спробуй ще!';
      resultsDiv.innerHTML = `
        <div class="score-circle"><span class="score-num">${score}/${total}</span><span class="score-label">${percentage}%</span></div>
        <div class="grade-text">${grade}</div>
        <div class="result-cat"><img src="${getCatUrl()}"></div>
        <div class="results-details">
          <div class="detail-box"><div class="value">${score}</div><div class="label">Вірно</div></div>
          <div class="detail-box"><div class="value">${total-score}</div><div class="label">Помилок</div></div>
          <div class="detail-box"><div class="value">${percentage}%</div><div class="label">Успіх</div></div>
        </div>
        <div class="results-buttons">
          <button class="btn btn-primary" onclick="location.reload()">Ще раз</button>
          <a href="./" class="btn btn-secondary">До каталогу</a>
        </div>
      `;
      lucide.createIcons();
      
      // Save results
      const user = Auth.getUser();
      if (user) {
        API.saveResult({ name: user.name, email: user.email, quizId, score, total, percentage, mode: quizMode });
      }
    }
  </script>
</body>
</html>
