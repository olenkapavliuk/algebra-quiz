<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квіз — Алгебра 10 клас</title>
  <!-- KaTeX for beautiful math formulas -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #e0e0e0;
    }

    .container {
      max-width: 750px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      padding: 30px 0;
    }

    .header h1 {
      font-size: 1.8em;
      background: linear-gradient(90deg, #f093fb, #f5576c, #fda085);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: #a0a0c0;
      font-size: 1.05em;
    }

    .back-link {
      display: inline-block;
      color: #818cf8;
      text-decoration: none;
      font-size: 0.95em;
      margin-bottom: 10px;
    }

    .back-link:hover { text-decoration: underline; }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Welcome screen */
    #welcome { text-align: center; }
    #welcome h2 { font-size: 1.5em; margin-bottom: 20px; color: #fff; }

    .info-box {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      text-align: left;
    }

    .info-box h3 { color: #818cf8; margin-bottom: 10px; font-size: 1.1em; }

    input[type="text"] {
      width: 100%;
      max-width: 350px;
      padding: 14px 20px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1.1em;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus { border-color: #818cf8; }
    input[type="text"]::placeholder { color: #666; }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Progress bar */
    .progress-bar {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    .question-counter {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 0.9em;
      color: #a0a0c0;
    }

    /* Question */
    .question-text {
      font-size: 1.25em;
      color: #fff;
      margin-bottom: 25px;
      line-height: 1.7;
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      padding: 16px 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1.05em;
      line-height: 1.5;
    }

    .option:hover {
      border-color: rgba(129, 140, 248, 0.5);
      background: rgba(129, 140, 248, 0.1);
    }

    .option.correct {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.15);
      animation: pulse 0.3s ease;
    }

    .option.wrong {
      border-color: #f87171;
      background: rgba(248, 113, 113, 0.15);
    }

    .option.show-correct {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.1);
    }

    @keyframes pulse { 50% { transform: scale(1.02); } }

    .option.disabled { pointer-events: none; }

    .explanation {
      margin-top: 20px;
      padding: 15px 20px;
      border-radius: 12px;
      font-size: 0.95em;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }

    .explanation.correct-exp {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: #6ee7b7;
    }

    .explanation.wrong-exp {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #fca5a5;
    }

    /* Cat meme */
    .cat-meme {
      text-align: center;
      margin-top: 15px;
      animation: fadeIn 0.4s ease;
    }

    .cat-meme img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      border: 3px solid rgba(255, 255, 255, 0.15);
    }

    .cat-meme .cat-caption {
      margin-top: 8px;
      font-size: 1.05em;
      font-weight: 600;
    }

    .cat-caption.correct-cat { color: #34d399; }
    .cat-caption.wrong-cat { color: #fca5a5; }

    /* Matching question */
    .matching-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: start;
    }

    .matching-left, .matching-right {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .matching-arrows {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: center;
      padding-top: 4px;
    }

    .matching-item {
      padding: 12px 16px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      font-size: 0.95em;
      min-height: 46px;
      display: flex;
      align-items: center;
      line-height: 1.4;
    }

    .matching-item.left-item {
      cursor: pointer;
      transition: all 0.2s;
    }

    .matching-item.left-item:hover { border-color: rgba(129,140,248,0.5); }
    .matching-item.left-item.selected { border-color: #818cf8; background: rgba(129,140,248,0.15); }

    .matching-item.right-item {
      cursor: pointer;
      transition: all 0.2s;
    }

    .matching-item.right-item:hover { border-color: rgba(129,140,248,0.5); }

    .matching-item.matched { border-color: #818cf8; opacity: 0.6; pointer-events: none; }
    .matching-item.match-correct { border-color: #34d399; background: rgba(52,211,153,0.1); }
    .matching-item.match-wrong { border-color: #f87171; background: rgba(248,113,113,0.1); }

    .match-line {
      color: #818cf8;
      font-size: 0.8em;
    }

    .match-pair-display {
      padding: 6px 0;
      font-size: 0.9em;
      color: #c0c0e0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Fill blanks question */
    .fill-blank-text {
      font-size: 1.15em;
      line-height: 2;
      color: #fff;
    }

    .blank-slot {
      display: inline-block;
      min-width: 80px;
      padding: 4px 12px;
      border: 2px dashed rgba(129,140,248,0.4);
      border-radius: 8px;
      background: rgba(129,140,248,0.05);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      vertical-align: middle;
      margin: 2px 4px;
      min-height: 32px;
    }

    .blank-slot:hover { border-color: #818cf8; }
    .blank-slot.filled { border-style: solid; border-color: #818cf8; background: rgba(129,140,248,0.15); color: #fff; }
    .blank-slot.slot-correct { border-color: #34d399; background: rgba(52,211,153,0.1); }
    .blank-slot.slot-wrong { border-color: #f87171; background: rgba(248,113,113,0.1); }

    .blank-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    .blank-option {
      padding: 8px 16px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95em;
      color: #e0e0e0;
    }

    .blank-option:hover { border-color: rgba(129,140,248,0.5); background: rgba(129,140,248,0.1); }
    .blank-option.used { opacity: 0.3; pointer-events: none; }

    /* Ordering question */
    .ordering-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ordering-item {
      padding: 14px 18px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      cursor: grab;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
      font-size: 0.95em;
    }

    .ordering-item:active { cursor: grabbing; }
    .ordering-item:hover { border-color: rgba(129,140,248,0.4); }
    .ordering-item.dragging { opacity: 0.5; border-color: #818cf8; }
    .ordering-item.drag-over { border-color: #818cf8; border-style: dashed; }
    .ordering-item.order-correct { border-color: #34d399; background: rgba(52,211,153,0.1); }
    .ordering-item.order-wrong { border-color: #f87171; background: rgba(248,113,113,0.1); }

    .ordering-handle {
      color: #555;
      font-size: 1.2em;
      cursor: grab;
    }

    .ordering-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(129,140,248,0.2);
      color: #818cf8;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8em; font-weight: 700;
      flex-shrink: 0;
    }

    .next-btn-wrap {
      text-align: center;
      margin-top: 25px;
    }

    /* Results screen */
    #results { text-align: center; }

    .score-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin: 0 auto 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 3em;
      font-weight: 700;
      position: relative;
    }

    .score-circle::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 4px;
      background: conic-gradient(var(--score-color) var(--score-deg), rgba(255,255,255,0.1) 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .score-circle .score-num { color: #fff; }
    .score-circle .score-label { font-size: 0.3em; color: #a0a0c0; font-weight: 400; }

    .grade-text { font-size: 1.4em; margin-bottom: 8px; font-weight: 600; }

    .result-cat {
      text-align: center;
      margin: 20px 0;
    }

    .result-cat img {
      width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 20px;
      border: 3px solid rgba(255, 255, 255, 0.15);
    }

    .result-cat .cat-caption {
      margin-top: 10px;
      font-size: 1.15em;
      font-weight: 600;
    }

    .results-details {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 25px 0;
    }

    .detail-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
    }

    .detail-box .value { font-size: 1.5em; font-weight: 700; color: #fff; }
    .detail-box .label { font-size: 0.85em; color: #a0a0c0; margin-top: 4px; }

    .results-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #c0c0e0;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .review-section { margin-top: 30px; text-align: left; }
    .review-section h3 { text-align: center; margin-bottom: 20px; color: #c0c0e0; }

    .review-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }

    .review-item.review-correct { border-left-color: #34d399; }
    .review-item.review-wrong { border-left-color: #f87171; }
    .review-question { font-weight: 600; margin-bottom: 8px; color: #e0e0e0; }
    .review-answer { font-size: 0.95em; color: #a0a0c0; line-height: 1.6; }
    .review-answer span { font-weight: 600; }
    .green { color: #34d399; }
    .red { color: #f87171; }

    /* True/False options */
    .tf-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tf-options .option {
      text-align: center;
      font-size: 1.1em;
      font-weight: 600;
    }

    /* Text input answer */
    .text-input-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .text-input-wrap input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1.1em;
      outline: none;
      transition: border-color 0.3s;
      font-family: 'Cambria Math', 'Segoe UI', sans-serif;
    }

    .text-input-wrap input:focus {
      border-color: #818cf8;
    }

    .text-input-wrap input::placeholder {
      color: #555;
    }

    .text-input-wrap input.input-correct {
      border-color: #34d399;
      background: rgba(52, 211, 153, 0.1);
    }

    .text-input-wrap input.input-wrong {
      border-color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    .btn-check {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .btn-check:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-check:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .correct-answer-show {
      margin-top: 10px;
      padding: 10px 15px;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      color: #6ee7b7;
      font-size: 0.95em;
    }

    /* Question type badge */
    .q-type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 0.75em;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .q-type-badge.badge-tf {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .q-type-badge.badge-input { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .q-type-badge.badge-matching { background: rgba(168,85,247,0.15); color: #c084fc; }
    .q-type-badge.badge-fill { background: rgba(251,146,60,0.15); color: #fb923c; }
    .q-type-badge.badge-order { background: rgba(45,212,191,0.15); color: #2dd4bf; }

    /* Theory block */
    .theory-toggle {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 24px;
      border: 1px solid rgba(129, 140, 248, 0.3);
      border-radius: 10px;
      background: rgba(129, 140, 248, 0.1);
      color: #818cf8;
      cursor: pointer;
      font-size: 0.95em;
      font-weight: 600;
      transition: all 0.3s;
    }

    .theory-toggle:hover {
      background: rgba(129, 140, 248, 0.2);
      border-color: rgba(129, 140, 248, 0.5);
    }

    .theory-block {
      display: none;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 25px;
      text-align: left;
      line-height: 1.8;
      animation: fadeIn 0.3s ease;
    }

    .theory-block.open { display: block; }

    .theory-block h4 {
      color: #818cf8;
      margin-bottom: 12px;
      font-size: 1.05em;
    }

    .theory-block ul {
      list-style: none;
      padding: 0;
    }

    .theory-block li {
      padding: 5px 0;
      color: #c0c0e0;
      font-size: 0.95em;
    }

    .theory-block li .katex { font-size: 1em; }

    .theory-block .formula-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .theory-block .formula-label {
      color: #a0a0c0;
      min-width: 80px;
      font-size: 0.85em;
    }

    /* Auth styles */
    .user-badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px; padding: 6px 16px 6px 6px;
    }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; }
    .user-name { color: #e0e0e0; font-size: 0.95em; }
    .btn-signout { background:none; border:none; color:#888; cursor:pointer; font-size:1em; padding:2px 6px; }
    .btn-signout:hover { color: #f87171; }
    .login-prompt { color: #a0a0c0; margin-bottom: 15px; font-size: 0.95em; }
    .user-info-row {
      display: inline-flex; align-items: center; gap: 12px; margin-bottom: 15px;
    }
    .user-info-row img { width: 44px; height: 44px; border-radius: 50%; }
    .user-info-row span { color: #fff; font-size: 1.15em; font-weight: 600; }

    /* New achievement popup */
    .new-achievements {
      margin: 20px 0;
      padding: 15px 20px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 14px;
      animation: fadeIn 0.5s ease;
    }
    .new-achievements h4 { color: #34d399; margin-bottom: 10px; text-align: center; }
    .new-ach-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }
    .new-ach-item .ach-icon { font-size: 1.5em; }
    .new-ach-item .ach-title { color: #fff; font-weight: 600; }
    .new-ach-item .ach-desc { color: #a0a0c0; font-size: 0.85em; }

    /* Hint system */
    .hint-btn {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 10px;
      background: rgba(251,191,36,0.08);
      color: #fbbf24;
      cursor: pointer;
      font-size: 0.85em;
      margin-bottom: 15px;
      transition: all 0.2s;
    }
    .hint-btn:hover { background: rgba(251,191,36,0.15); }
    .hint-btn:disabled { opacity: 0.3; cursor: default; }

    .hint-box {
      padding: 12px 16px;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 10px;
      color: #fcd34d;
      font-size: 0.9em;
      margin-bottom: 15px;
      animation: fadeIn 0.3s ease;
    }

    .hint-penalty {
      font-size: 0.8em;
      color: #a0a0c0;
      margin-top: 4px;
    }

    /* Sound toggle */
    .sound-toggle {
      position: fixed; top: 15px; right: 15px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2em; z-index: 100;
      transition: all 0.2s;
    }
    .sound-toggle:hover { background: rgba(255,255,255,0.12); }

    /* Animations */
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    .anim-bounce { animation: bounceIn 0.5s ease; }
    .anim-shake { animation: shakeX 0.5s ease; }
    .anim-correct { animation: bounceIn 0.4s ease; }

    .confetti-container {
      position: fixed; top: 50%; left: 50%;
      pointer-events: none; z-index: 1000;
    }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confetti 1.5s ease-out forwards;
    }

    /* KaTeX overrides for dark theme */
    .katex { color: #e0e0e0; }
    .option .katex { font-size: 1em; }
    .question-text .katex { font-size: 1.1em; }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.4em; }
      .question-text { font-size: 1.1em; }
      .results-details { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sound-toggle" onclick="this.textContent = Sound.toggle() ? '🔊' : '🔇'" title="Звук">🔊</div>
    <a href="./" class="back-link">← Всі квізи</a>

    <div id="quiz" class="card" style="display:none;">

  </div>

  <script src="js/quizzes.js"></script>

  <script>
// Cat messages
const correctCatMessages = [

];

const resultCatMessages = {
  excellent: ['Кіт коронує тебе!', 'Кіт в шоці від геніальності!', 'Мурр! Ти легенда!'],
  good: ['Кіт задоволений! Майже ідеально!', 'Хороший результат!', 'Ще трішки і буде відмінно!'],
  ok: ['Непогано, але є куди рости!', 'Кіт вірить — ти можеш краще!', 'Повтори формули!'],
  bad: ['Кіт обіймає! Повтори теорію!', 'Не сумуй! Перечитай формули!', 'Нічого, всі починали з нуля!']
};

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function getCatUrl() { return `https://cataas.com/cat?t=${Date.now()}-${Math.random()}`; }

// Shuffle array (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Render KaTeX in element
function renderMath(el) {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(el || document.body, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });
  }
}

// Theory content for quizzes (key = quiz id)
const THEORY = {
  '3-7-addition': {
    title: 'Формули додавання та пониження степеня',
    items: [
      '$\\sin(\\alpha + \\beta) = \\sin\\alpha\\cos\\beta + \\cos\\alpha\\sin\\beta$',
      '$\\sin(\\alpha - \\beta) = \\sin\\alpha\\cos\\beta - \\cos\\alpha\\sin\\beta$',
      '$\\cos(\\alpha + \\beta) = \\cos\\alpha\\cos\\beta - \\sin\\alpha\\sin\\beta$',
      '$\\cos(\\alpha - \\beta) = \\cos\\alpha\\cos\\beta + \\sin\\alpha\\sin\\beta$',
      '$\\operatorname{tg}(\\alpha + \\beta) = \\dfrac{\\operatorname{tg}\\alpha + \\operatorname{tg}\\beta}{1 - \\operatorname{tg}\\alpha \\cdot \\operatorname{tg}\\beta}$',
      '$\\sin^2\\alpha = \\dfrac{1 - \\cos 2\\alpha}{2}$, $\\;\\cos^2\\alpha = \\dfrac{1 + \\cos 2\\alpha}{2}$'
    ]
  },
  '3-8-double-angle': {
    title: 'Формули подвійного аргументу',
    items: [
      '$\\sin 2\\alpha = 2\\sin\\alpha\\cos\\alpha$',
      '$\\cos 2\\alpha = \\cos^2\\alpha - \\sin^2\\alpha = 2\\cos^2\\alpha - 1 = 1 - 2\\sin^2\\alpha$',
      '$\\operatorname{tg} 2\\alpha = \\dfrac{2\\operatorname{tg}\\alpha}{1 - \\operatorname{tg}^2\\alpha}$'
    ]
  },
  '3-5-identities': {
    title: 'Основні тригонометричні тотожності',
    items: [
      '$\\sin^2\\alpha + \\cos^2\\alpha = 1$',
      '$\\operatorname{tg}\\alpha = \\dfrac{\\sin\\alpha}{\\cos\\alpha}$, $\\;\\operatorname{ctg}\\alpha = \\dfrac{\\cos\\alpha}{\\sin\\alpha}$',
      '$\\operatorname{tg}\\alpha \\cdot \\operatorname{ctg}\\alpha = 1$',
      '$1 + \\operatorname{tg}^2\\alpha = \\dfrac{1}{\\cos^2\\alpha}$, $\\;1 + \\operatorname{ctg}^2\\alpha = \\dfrac{1}{\\sin^2\\alpha}$'
    ]
  },
  '3-6-reduction': {
    title: 'Формули зведення — правила',
    items: [
      'Якщо аргумент $\\dfrac{\\pi}{2} \\pm \\alpha$ або $\\dfrac{3\\pi}{2} \\pm \\alpha$ — функція ЗМІНЮЄТЬСЯ (sin↔cos, tg↔ctg)',
      'Якщо аргумент $\\pi \\pm \\alpha$ або $2\\pi \\pm \\alpha$ — функція НЕ змінюється',
      'Знак визначається за чвертю, в яку потрапляє аргумент (вважаємо $\\alpha$ гострим)'
    ]
  },
  '3-1-radians': {
    title: 'Радіанна міра кута',
    items: [
      '$180° = \\pi$ рад, $\\;360° = 2\\pi$ рад',
      '$\\alpha_{рад} = \\dfrac{\\alpha° \\cdot \\pi}{180}$, $\\;\\alpha° = \\dfrac{\\alpha_{рад} \\cdot 180}{\\pi}$',
      'Основні значення: $30° = \\dfrac{\\pi}{6}$, $45° = \\dfrac{\\pi}{4}$, $60° = \\dfrac{\\pi}{3}$, $90° = \\dfrac{\\pi}{2}$'
    ]
  },
  '3-2-trig-circle': {
    title: 'Табличні значення',
    items: [
      '$\\sin 0° = 0$, $\\sin 30° = \\dfrac{1}{2}$, $\\sin 45° = \\dfrac{\\sqrt{2}}{2}$, $\\sin 60° = \\dfrac{\\sqrt{3}}{2}$, $\\sin 90° = 1$',
      '$\\cos 0° = 1$, $\\cos 30° = \\dfrac{\\sqrt{3}}{2}$, $\\cos 45° = \\dfrac{\\sqrt{2}}{2}$, $\\cos 60° = \\dfrac{1}{2}$, $\\cos 90° = 0$',
      '$\\operatorname{tg} 0° = 0$, $\\operatorname{tg} 30° = \\dfrac{1}{\\sqrt{3}}$, $\\operatorname{tg} 45° = 1$, $\\operatorname{tg} 60° = \\sqrt{3}$'
    ]
  },
  '5-3-derivative-concept': {
    title: 'Основні похідні',
    items: [
      "$(C)' = 0$, $(x)' = 1$, $(x^n)' = nx^{n-1}$",
      "$(\\sin x)' = \\cos x$, $(\\cos x)' = -\\sin x$",
      "$(e^x)' = e^x$, $(\\ln x)' = \\dfrac{1}{x}$",
      "$(f + g)' = f' + g'$, $(C \\cdot f)' = C \\cdot f'$"
    ]
  },
  '5-4-derivative-rules': {
    title: 'Правила диференціювання',
    items: [
      "$(f \\cdot g)' = f'g + fg'$ — правило добутку",
      "$\\left(\\dfrac{f}{g}\\right)' = \\dfrac{f'g - fg'}{g^2}$ — правило частки",
      "$(f(g(x)))' = f'(g(x)) \\cdot g'(x)$ — похідна складеної функції"
    ]
  },
  '4-2-simple-equations': {
    title: 'Формули розв\'язків тригонометричних рівнянь',
    items: [
      '$\\sin x = a \\Rightarrow x = (-1)^n \\arcsin a + \\pi n$',
      '$\\cos x = a \\Rightarrow x = \\pm \\arccos a + 2\\pi n$',
      '$\\operatorname{tg} x = a \\Rightarrow x = \\operatorname{arctg} a + \\pi n$',
      'де $n \\in \\mathbb{Z}$'
    ]
  },
  '2-1-powers': {
    title: 'Властивості степенів',
    items: [
      '$a^m \\cdot a^n = a^{m+n}$, $\\;\\dfrac{a^m}{a^n} = a^{m-n}$',
      '$(a^m)^n = a^{mn}$, $\\;(ab)^n = a^n b^n$',
      '$a^0 = 1$, $\\;a^{-n} = \\dfrac{1}{a^n}$'
    ]

};

// Get quiz ID from URL
const params = new URLSearchParams(window.location.search);
const quizId = params.get('id');
const quizData = QUIZZES.find(q => q.id === quizId);

if (!quizData) {
  document.querySelector('.container').innerHTML = `
    <div style="text-align:center; padding: 60px 20px;">
      <h2 style="color:#fff; margin-bottom:15px;">Квіз не знайдено</h2>
      <p style="color:#a0a0c0; margin-bottom:20px;">Можливо, він ще не створений.</p>
      <a href="./" class="btn btn-primary" style="display:inline-block; padding:14px 36px; border-radius:12px; text-decoration:none; color:#fff; background:linear-gradient(135deg,#667eea,#764ba2);">← До каталогу</a>
    </div>`;
} else {
  // Set up page
  document.getElementById('quizTitle').textContent = quizData.title;
  document.getElementById('quizDescription').textContent = quizData.sectionName;
  document.getElementById('quizInfoTitle').textContent = quizData.title;
  document.getElementById('quizInfoDesc').textContent = quizData.description;
  document.title = `${quizData.title} — Квіз`;
}

// Prepare shuffled questions with shuffled options
let preparedQuestions = [];
if (quizData) {
  preparedQuestions = shuffle(quizData.questions).map(q => {
    const type = q.type || 'choice';

    // These types have no options to shuffle
    if (['text_input', 'true_false', 'matching', 'fill_blanks', 'ordering'].includes(type)) {
      return { ...q, type };
    }

    // Regular choice: shuffle options
    const correctAnswer = q.options[q.correct];
    const shuffledOptions = shuffle(q.options);
    const newCorrectIndex = shuffledOptions.indexOf(correctAnswer);
    return { ...q, type, options: shuffledOptions, correct: newCorrectIndex };
  });
}

let currentQuestion = 0;
let score = 0;
let answers = [];
let startTime;
let timerInterval;
let studentName = '';
let studentUser = null;
let hintUsed = false;

// Show theory block if available for this quiz
if (quizData && THEORY[quizData.id]) {
  const t = THEORY[quizData.id];
  document.getElementById('theoryToggleWrap').innerHTML =
    `<div class="theory-toggle" onclick="document.getElementById('theoryBlock').classList.toggle('open'); this.textContent = this.textContent.includes('Переглянути') ? '▲ Сховати теорію' : '📖 Переглянути теорію'">📖 Переглянути теорію</div>`;
  document.getElementById('theoryBlock').innerHTML =
    `<h4>${t.title}</h4><ul>${t.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
}

// Wait for KaTeX and Google to load
window.addEventListener('load', () => {
  setTimeout(() => renderMath(), 100);

  if (!quizData) return;

  const user = Auth.getUser();
  const loginArea = document.getElementById('loginArea');
  const startBtn = document.getElementById('startBtn');

  if (user) {
    studentName = user.name;
    studentUser = user;
    loginArea.innerHTML = `
      <div class="user-info-row">
        <img src="${user.picture}" referrerpolicy="no-referrer" alt="">
        <span>${user.name}</span>
      </div>`;
    startBtn.style.display = 'inline-block';
  } else {
    loginArea.innerHTML = '<p class="login-prompt">Увійди через Google, щоб почати квіз</p><div id="googleBtn"></div>';
    Auth.init(() => location.reload());
    setTimeout(() => { Auth.renderButton('googleBtn'); Auth.prompt(); }, 200);
  }
});

function startQuiz() {
  if (!studentName || studentName.length < 2) return;

  document.getElementById('welcome').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';

  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  showQuestion();
}

function updateTimer() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  document.getElementById('timer').textContent = `⏱ ${min}:${sec.toString().padStart(2, '0')}`;
}

function showQuestion() {
  const q = preparedQuestions[currentQuestion];
  const total = preparedQuestions.length;

  document.getElementById('questionNum').textContent = `Питання ${currentQuestion + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${(currentQuestion / total) * 100}%`;

  // Type badge
  const badges = {
    true_false: '<span class="q-type-badge badge-tf">Правильно чи ні?</span><br>',
    text_input: '<span class="q-type-badge badge-input">Введи відповідь</span><br>',
    matching: '<span class="q-type-badge badge-matching">Встанови відповідність</span><br>',
    fill_blanks: '<span class="q-type-badge badge-fill">Заповни пропуски</span><br>',
    ordering: '<span class="q-type-badge badge-order">Розстав у порядку</span><br>'
  };
  document.getElementById('questionText').innerHTML = (badges[q.type] || '') + q.question;

  const optionsEl = document.getElementById('options');
  optionsEl.classList.remove('tf-options');

  if (q.type === 'text_input') {
    optionsEl.innerHTML = `
      <div class="text-input-wrap">
        <input type="text" id="textAnswer" placeholder="Введи відповідь..." autocomplete="off">
        <button class="btn-check" onclick="checkTextAnswer()">Перевірити</button>
      </div>
      <div id="correctAnswerShow"></div>`;
    setTimeout(() => {
      const inp = document.getElementById('textAnswer');
      if (inp) { inp.focus(); inp.addEventListener('keypress', e => { if (e.key === 'Enter') checkTextAnswer(); }); }
    }, 50);

  } else if (q.type === 'true_false') {
    optionsEl.classList.add('tf-options');
    optionsEl.innerHTML = q.options.map((opt, i) =>
      `<div class="option" onclick="selectAnswer(${i})" id="opt${i}">${opt}</div>`
    ).join('');

  } else if (q.type === 'matching') {
    renderMatching(q, optionsEl);

  } else if (q.type === 'fill_blanks') {
    renderFillBlanks(q, optionsEl);

  } else if (q.type === 'ordering') {
    renderOrdering(q, optionsEl);

  } else {
    optionsEl.innerHTML = q.options.map((opt, i) =>
      `<div class="option" onclick="selectAnswer(${i})" id="opt${i}">${String.fromCharCode(65 + i)}) ${opt}</div>`
    ).join('');
  }

  document.getElementById('explanationBox').innerHTML = '';
  document.getElementById('nextBtnWrap').style.display = 'none';

  // Show hint button if question has a hint
  const hintArea = document.getElementById('hintArea');
  if (hintArea) hintArea.remove();
  if (q.hint) {
    const hintDiv = document.createElement('div');
    hintDiv.id = 'hintArea';
    hintDiv.innerHTML = `<button class="hint-btn" onclick="showHint()">💡 Підказка (-50% балів)</button>`;
    document.getElementById('options').before(hintDiv);
  }
  hintUsed = false;

  // Render math in question and options
  setTimeout(() => renderMath(document.getElementById('quiz')), 10);
}

function showFeedback(isCorrect, explanation) {
  // Play sound
  if (isCorrect) { Sound.correct(); } else { Sound.wrong(); }

  const expClass = isCorrect ? 'correct-exp' : 'wrong-exp';
  const animClass = isCorrect ? 'anim-correct' : 'anim-shake';
  const prefix = isCorrect ? '✓ Правильно!' : '✗ Неправильно.';
  const catMsg = isCorrect ? rand(correctCatMessages) : rand(wrongCatMessages);
  const catClass = isCorrect ? 'correct-cat' : 'wrong-cat';

  document.getElementById('explanationBox').innerHTML =
    `<div class="explanation ${expClass} ${animClass}"><strong>${prefix}</strong> ${explanation}</div>
     <div class="cat-meme">
       <img src="${getCatUrl()}" alt="Cat" onerror="this.src='https://placekitten.com/200/200'">
       <div class="cat-caption ${catClass}">${catMsg}</div>
     </div>`;

  document.getElementById('nextBtnWrap').style.display = 'block';
  setTimeout(() => renderMath(document.getElementById('explanationBox')), 10);
}

// Confetti effect for good results
function showConfetti() {
  const colors = ['#f093fb', '#f5576c', '#fda085', '#667eea', '#34d399', '#fbbf24'];
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.left = (Math.random() * 200 - 100) + 'px';
    piece.style.top = (Math.random() * 50) + 'px';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.animationDuration = (1 + Math.random()) + 's';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 2500);
}

function showHint() {
  const q = preparedQuestions[currentQuestion];
  if (!q.hint || hintUsed) return;
  hintUsed = true;
  const hintArea = document.getElementById('hintArea');
  if (hintArea) {
    hintArea.innerHTML = `
      <div class="hint-box">💡 ${q.hint}
        <div class="hint-penalty">⚠️ За цю відповідь буде нараховано 50% балів</div>
      </div>`;
    setTimeout(() => renderMath(hintArea), 10);
  }
  Sound.click();
}

function selectAnswer(index) {
  const q = preparedQuestions[currentQuestion];
  const isCorrect = index === q.correct;

  document.querySelectorAll('.option').forEach(el => el.classList.add('disabled'));

  if (isCorrect) {
    document.getElementById(`opt${index}`).classList.add('correct');
    score += hintUsed ? 0.5 : 1;
  } else {
    document.getElementById(`opt${index}`).classList.add('wrong');
    document.getElementById(`opt${q.correct}`).classList.add('show-correct');
  }

  answers.push({
    question: q.question,
    selected: q.options[index],
    correct: q.options[q.correct],
    isCorrect
  });

  showFeedback(isCorrect, q.explanation);
}

function checkTextAnswer() {
  const q = preparedQuestions[currentQuestion];
  const input = document.getElementById('textAnswer');
  const btn = document.querySelector('.btn-check');
  if (!input || !btn) return;

  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  btn.disabled = true;
  input.disabled = true;

  // Normalize for comparison: lowercase, remove spaces, replace comma with dot
  const normalize = s => s.toLowerCase().replace(/\s+/g, '').replace(',', '.');
  const correctAnswers = Array.isArray(q.correct) ? q.correct : [q.correct];
  const isCorrect = correctAnswers.some(ca => normalize(userAnswer) === normalize(ca));

  if (isCorrect) {
    input.classList.add('input-correct');
    score += hintUsed ? 0.5 : 1;
  } else {
    input.classList.add('input-wrong');
    const correctDisplay = Array.isArray(q.correct) ? q.correct[0] : q.correct;
    document.getElementById('correctAnswerShow').innerHTML =
      `<div class="correct-answer-show">Правильна відповідь: <strong>${correctDisplay}</strong></div>`;
    setTimeout(() => renderMath(document.getElementById('correctAnswerShow')), 10);
  }

  const correctDisplay = Array.isArray(q.correct) ? q.correct[0] : q.correct;
  answers.push({
    question: q.question,
    selected: userAnswer,
    correct: correctDisplay,
    isCorrect
  });

  showFeedback(isCorrect, q.explanation);
}

// ====== MATCHING ======
let matchState = {};
function renderMatching(q, el) {
  const leftItems = q.pairs.map(p => p[0]);
  const rightItems = shuffle(q.pairs.map(p => p[1]));
  matchState = { pairs: q.pairs, selected: null, matches: {}, leftItems, rightItems };

  el.innerHTML = `
    <div class="matching-container">
      <div class="matching-left">
        ${leftItems.map((item, i) => `<div class="matching-item left-item" id="ml${i}" onclick="matchSelectLeft(${i})">${item}</div>`).join('')}
      </div>
      <div class="matching-arrows" id="matchArrows">
        ${leftItems.map(() => '<div class="match-line" style="min-height:46px;display:flex;align-items:center;">—</div>').join('')}
      </div>
      <div class="matching-right">
        ${rightItems.map((item, i) => `<div class="matching-item right-item" id="mr${i}" onclick="matchSelectRight(${i})">${item}</div>`).join('')}
      </div>
    </div>
    <div style="text-align:center;margin-top:15px;">
      <button class="btn-check" id="matchCheckBtn" onclick="checkMatching()" style="display:none;">Перевірити</button>
    </div>`;
  setTimeout(() => renderMath(el), 10);
}

function matchSelectLeft(i) {
  document.querySelectorAll('.left-item').forEach(el => el.classList.remove('selected'));
  if (matchState.matches[i] !== undefined) return;
  matchState.selected = i;
  document.getElementById(`ml${i}`).classList.add('selected');
}

function matchSelectRight(j) {
  if (matchState.selected === null) return;
  const i = matchState.selected;
  if (matchState.matches[i] !== undefined) return;

  matchState.matches[i] = j;
  document.getElementById(`ml${i}`).classList.add('matched');
  document.getElementById(`ml${i}`).classList.remove('selected');
  document.getElementById(`mr${j}`).classList.add('matched');

  const arrows = document.getElementById('matchArrows').children;
  arrows[i].textContent = '→';
  arrows[i].style.color = '#818cf8';
  matchState.selected = null;

  if (Object.keys(matchState.matches).length === matchState.pairs.length) {
    document.getElementById('matchCheckBtn').style.display = 'inline-block';
  }
}

function checkMatching() {
  const q = preparedQuestions[currentQuestion];
  let correctCount = 0;
  const { pairs, matches, leftItems, rightItems } = matchState;

  pairs.forEach((pair, i) => {
    const userRight = rightItems[matches[i]];
    const isCorrect = userRight === pair[1];
    document.getElementById(`ml${i}`).classList.add(isCorrect ? 'match-correct' : 'match-wrong');
    document.getElementById(`mr${matches[i]}`).classList.add(isCorrect ? 'match-correct' : 'match-wrong');
    if (isCorrect) correctCount++;
  });

  const allCorrect = correctCount === pairs.length;
  if (allCorrect) score += hintUsed ? 0.5 : 1;

  answers.push({
    question: q.question,
    selected: `${correctCount}/${pairs.length} пар`,
    correct: `${pairs.length}/${pairs.length} пар`,
    isCorrect: allCorrect
  });

  document.getElementById('matchCheckBtn').style.display = 'none';
  document.querySelectorAll('.matching-item').forEach(el => el.style.pointerEvents = 'none');
  showFeedback(allCorrect, q.explanation);
}

// ====== FILL BLANKS ======
let fillState = {};
function renderFillBlanks(q, el) {
  const blankOptions = q.allOptions ? shuffle([...q.allOptions]) : shuffle([...q.blanks]);
  fillState = { blanks: q.blanks, filled: {}, currentSlot: null, options: blankOptions };

  let html = `<div class="fill-blank-text">${q.template.replace(/___/g, () => {
    const idx = (html.match(/blank-slot/g) || []).length;
    return `<span class="blank-slot" id="slot${idx}" onclick="selectSlot(${idx})">?</span>`;
  })}</div>`;
  // Re-count slots properly
  let slotIdx = 0;
  const rendered = q.template.replace(/___/g, () => {
    const s = `<span class="blank-slot" id="slot${slotIdx}" onclick="selectSlot(${slotIdx})">?</span>`;
    slotIdx++;
    return s;
  });

  el.innerHTML = `
    <div class="fill-blank-text">${rendered}</div>
    <div class="blank-options" id="blankOptions">
      ${blankOptions.map((opt, i) => `<div class="blank-option" id="bopt${i}" onclick="selectBlankOption(${i})">${opt}</div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:15px;">
      <button class="btn-check" id="fillCheckBtn" onclick="checkFillBlanks()" style="display:none;">Перевірити</button>
    </div>`;
  setTimeout(() => renderMath(el), 10);
}

function selectSlot(idx) {
  document.querySelectorAll('.blank-slot').forEach(el => el.style.boxShadow = 'none');
  fillState.currentSlot = idx;
  document.getElementById(`slot${idx}`).style.boxShadow = '0 0 0 2px #818cf8';
}

function selectBlankOption(optIdx) {
  const slot = fillState.currentSlot;
  if (slot === null) {
    selectSlot(0);
    fillState.currentSlot = 0;
  }
  const slotEl = document.getElementById(`slot${fillState.currentSlot}`);
  const optEl = document.getElementById(`bopt${optIdx}`);

  // If slot already filled, unmark old option
  if (fillState.filled[fillState.currentSlot] !== undefined) {
    const oldOpt = fillState.filled[fillState.currentSlot];
    document.getElementById(`bopt${oldOpt}`).classList.remove('used');
  }

  fillState.filled[fillState.currentSlot] = optIdx;
  slotEl.textContent = fillState.options[optIdx];
  slotEl.classList.add('filled');
  optEl.classList.add('used');
  setTimeout(() => renderMath(slotEl), 10);

  // Auto-advance to next empty slot
  const totalSlots = fillState.blanks.length;
  for (let i = 1; i <= totalSlots; i++) {
    const next = (fillState.currentSlot + i) % totalSlots;
    if (fillState.filled[next] === undefined) {
      selectSlot(next);
      break;
    }
  }

  if (Object.keys(fillState.filled).length === totalSlots) {
    document.getElementById('fillCheckBtn').style.display = 'inline-block';
  }
}

function checkFillBlanks() {
  const q = preparedQuestions[currentQuestion];
  let correctCount = 0;

  q.blanks.forEach((correct, i) => {
    const userAnswer = fillState.options[fillState.filled[i]];
    const isCorrect = userAnswer === correct;
    const slotEl = document.getElementById(`slot${i}`);
    slotEl.classList.add(isCorrect ? 'slot-correct' : 'slot-wrong');
    if (isCorrect) correctCount++;
  });

  const allCorrect = correctCount === q.blanks.length;
  if (allCorrect) score += hintUsed ? 0.5 : 1;

  answers.push({
    question: q.question,
    selected: `${correctCount}/${q.blanks.length} пропусків`,
    correct: q.blanks.join(', '),
    isCorrect: allCorrect
  });

  document.getElementById('fillCheckBtn').style.display = 'none';
  document.querySelectorAll('.blank-option, .blank-slot').forEach(el => el.style.pointerEvents = 'none');
  showFeedback(allCorrect, q.explanation);
}

// ====== ORDERING ======
let orderState = {};
function renderOrdering(q, el) {
  const shuffled = shuffle([...q.items]);
  orderState = { correct: q.items, current: [...shuffled] };

  el.innerHTML = `
    <div class="ordering-list" id="orderList">
      ${shuffled.map((item, i) => `
        <div class="ordering-item" draggable="true" data-idx="${i}" id="oi${i}"
             ondragstart="orderDragStart(event)" ondragover="orderDragOver(event)"
             ondrop="orderDrop(event)" ondragend="orderDragEnd(event)"
             ontouchstart="orderTouchStart(event)" ontouchmove="orderTouchMove(event)" ontouchend="orderTouchEnd(event)">
          <span class="ordering-num">${i + 1}</span>
          <span class="ordering-handle">⠿</span>
          <span>${item}</span>
        </div>`).join('')}
    </div>
    <div style="text-align:center;margin-top:15px;">
      <button class="btn-check" onclick="checkOrdering()">Перевірити</button>
    </div>`;
  setTimeout(() => renderMath(el), 10);
}

let dragIdx = null;
function orderDragStart(e) {
  dragIdx = +e.target.closest('.ordering-item').dataset.idx;
  e.target.closest('.ordering-item').classList.add('dragging');
}
function orderDragOver(e) {
  e.preventDefault();
  const item = e.target.closest('.ordering-item');
  if (item) item.classList.add('drag-over');
}
function orderDrop(e) {
  e.preventDefault();
  const target = e.target.closest('.ordering-item');
  if (!target) return;
  const targetIdx = +target.dataset.idx;
  // Swap in array
  [orderState.current[dragIdx], orderState.current[targetIdx]] =
    [orderState.current[targetIdx], orderState.current[dragIdx]];
  reRenderOrder();
}
function orderDragEnd(e) {
  document.querySelectorAll('.ordering-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
}

// Touch support for mobile
let touchDragIdx = null;
function orderTouchStart(e) {
  touchDragIdx = +e.target.closest('.ordering-item').dataset.idx;
}
function orderTouchMove(e) { e.preventDefault(); }
function orderTouchEnd(e) {
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const item = target ? target.closest('.ordering-item') : null;
  if (item && touchDragIdx !== null) {
    const targetIdx = +item.dataset.idx;
    if (targetIdx !== touchDragIdx) {
      [orderState.current[touchDragIdx], orderState.current[targetIdx]] =
        [orderState.current[targetIdx], orderState.current[touchDragIdx]];
      reRenderOrder();
    }
  }
  touchDragIdx = null;
}

function reRenderOrder() {
  const list = document.getElementById('orderList');
  list.innerHTML = orderState.current.map((item, i) => `
    <div class="ordering-item" draggable="true" data-idx="${i}" id="oi${i}"
         ondragstart="orderDragStart(event)" ondragover="orderDragOver(event)"
         ondrop="orderDrop(event)" ondragend="orderDragEnd(event)"
         ontouchstart="orderTouchStart(event)" ontouchmove="orderTouchMove(event)" ontouchend="orderTouchEnd(event)">
      <span class="ordering-num">${i + 1}</span>
      <span class="ordering-handle">⠿</span>
      <span>${item}</span>
    </div>`).join('');
  setTimeout(() => renderMath(list), 10);
}

function checkOrdering() {
  const q = preparedQuestions[currentQuestion];
  let correctCount = 0;

  orderState.current.forEach((item, i) => {
    const isCorrect = item === orderState.correct[i];
    document.getElementById(`oi${i}`).classList.add(isCorrect ? 'order-correct' : 'order-wrong');
    if (isCorrect) correctCount++;
  });

  const allCorrect = correctCount === orderState.correct.length;
  if (allCorrect) score += hintUsed ? 0.5 : 1;

  answers.push({
    question: q.question,
    selected: `${correctCount}/${orderState.correct.length} на місці`,
    correct: orderState.correct.join(' → '),
    isCorrect: allCorrect
  });

  document.querySelectorAll('.ordering-item').forEach(el => {
    el.draggable = false;
    el.style.cursor = 'default';
    el.ontouchstart = null;
  });
  document.querySelector('.btn-check').style.display = 'none';
  showFeedback(allCorrect, q.explanation);
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < preparedQuestions.length) {
    showQuestion();
  } else {
    showResults();
  }
}

// Streak tracking — call on quiz completion
function updateStreak() {
  const today = new Date().toDateString();
  const d = JSON.parse(localStorage.getItem('quiz_streak') || '{"lastDate":"","streak":0,"longest":0}');
  if (d.lastDate === today) return d; // already played today
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  d.streak = (d.lastDate === yesterday.toDateString()) ? d.streak + 1 : 1;
  if (d.streak > d.longest) d.longest = d.streak;
  d.lastDate = today;
  localStorage.setItem('quiz_streak', JSON.stringify(d));
  return d;
}

async function showResults() {
  clearInterval(timerInterval);
  const total = preparedQuestions.length;
  const timeSpent = Math.floor((Date.now() - startTime) / 1000);
  const percentage = Math.round((score / total) * 100);
  const scoreDisplay = Number.isInteger(score) ? score : score.toFixed(1);

  // Save topic progress locally
  localStorage.setItem(`progress_${quizData.id}`, JSON.stringify({ percentage, date: new Date().toISOString() }));

  // Update streak
  const streak = updateStreak();

  document.getElementById('quiz').style.display = 'none';

  // Play completion sound
  Sound.complete();

  let gradeText, gradeColor, gradeKey;
  if (percentage >= 90) { gradeText = 'Відмінно!'; gradeColor = '#34d399'; gradeKey = 'excellent'; }
  else if (percentage >= 75) { gradeText = 'Добре!'; gradeColor = '#60a5fa'; gradeKey = 'good'; }
  else if (percentage >= 50) { gradeText = 'Задовільно'; gradeColor = '#fbbf24'; gradeKey = 'ok'; }
  else { gradeText = 'Потрібно повторити'; gradeColor = '#f87171'; gradeKey = 'bad'; }

  const resultCatMsg = rand(resultCatMessages[gradeKey]);
  const deg = (percentage / 100) * 360;
  const min = Math.floor(timeSpent / 60);
  const sec = timeSpent % 60;

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = `
    <div class="score-circle" style="--score-color: ${gradeColor}; --score-deg: ${deg}deg;">
      <span class="score-num">${scoreDisplay}/${total}</span>
      <span class="score-label">${percentage}%</span>
    </div>
    <div class="grade-text" style="color: ${gradeColor}">${gradeText}</div>
    <div class="result-cat">
      <img src="${getCatUrl()}" alt="Result cat" onerror="this.src='https://placekitten.com/260/260'">
      <div class="cat-caption" style="color: ${gradeColor}">${resultCatMsg}</div>
    </div>
    <div class="results-details">
      <div class="detail-box">
        <div class="value" style="color: #34d399">${scoreDisplay}</div>
        <div class="label">Правильних</div>
      </div>
      <div class="detail-box">
        <div class="value" style="color: #f87171">${total - score}</div>
        <div class="label">Помилок</div>
      </div>
      <div class="detail-box">
        <div class="value" style="color: #60a5fa">${min}:${sec.toString().padStart(2, '0')}</div>
        <div class="label">Час</div>
      </div>
    </div>
    ${streak.streak >= 2 ? `<div style="text-align:center;margin:10px 0 5px;font-size:1em;color:#fbbf24;">🔥 Серія: <strong>${streak.streak} дні поспіль</strong>${streak.streak >= 7 ? ' — Тижнева серія! 🏆' : ''}</div>` : ''}
    <div class="review-section">
      <h3>Детальний розбір</h3>
      ${answers.map((a, i) => `
        <div class="review-item ${a.isCorrect ? 'review-correct' : 'review-wrong'}">
          <div class="review-question">${i + 1}. ${a.question}</div>
          <div class="review-answer">
            Твоя відповідь: <span class="${a.isCorrect ? 'green' : 'red'}">${a.selected}</span>
            ${!a.isCorrect ? `<br>Правильна: <span class="green">${a.correct}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
    <div class="results-buttons">
      <button class="btn btn-primary" onclick="location.reload()">Пройти ще раз</button>
      <a href="./" class="btn btn-secondary" style="text-decoration:none;">Інші квізи</a>
    </div>
  `;
  resultsDiv.style.display = 'block';
  setTimeout(() => renderMath(resultsDiv), 10);

  // Confetti for good results
  if (percentage >= 75) setTimeout(() => showConfetti(), 300);

  // Save to cloud storage and check achievements
  const user = Auth.getUser();

  // Get achievements BEFORE saving (to detect new ones)
  let oldAchievements = [];
  if (user && user.email) {
    const oldResults = await API.getResultsByEmail(user.email);
    oldAchievements = getEarnedAchievements(oldResults, QUIZZES).map(a => a.id);
  }

  await API.saveResult({
    name: studentName,
    email: user ? user.email : '',
    picture: user ? user.picture : '',
    quizId: quizData.id,
    quizTitle: quizData.title,
    score, total, answers, timeSpent
  });

  // Check for NEW achievements
  if (user && user.email) {
    const newResults = await API.getResultsByEmail(user.email);
    const newAchievements = getEarnedAchievements(newResults, QUIZZES).filter(a => !oldAchievements.includes(a.id));

    if (newAchievements.length > 0) {
      Sound.achievement();
      const achHtml = newAchievements.map(a =>
        `<div class="new-ach-item"><span class="ach-icon">${a.icon}</span><div><div class="ach-title">${a.title}</div><div class="ach-desc">${a.description}</div></div></div>`
      ).join('');
      const achBlock = document.createElement('div');
      achBlock.className = 'new-achievements anim-bounce';
      achBlock.innerHTML = `<h4>Нове досягнення!</h4>${achHtml}`;
      resultsDiv.querySelector('.results-buttons').before(achBlock);
    }
  }
}
</script>
