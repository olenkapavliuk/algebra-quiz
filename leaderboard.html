<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рейтинг — ALGEBRA.SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Decorative pixel background -->
  <div class="pixel-bg"></div>

  <!-- Corner brackets -->
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <!-- Navigation -->
  <nav>
    <div class="stripe-bar"></div>
    <div class="container">
      <div class="nav-inner">
        <a href="./" class="nav-logo">
          <div class="nav-logo-icon">Σ</div>
          <div>
            <span class="nav-logo-text">ALGEBRA.SYS</span>
            <span class="nav-logo-sub">◈ SIGNAL GRAPHICS V2.0 ◈</span>
          </div>
        </a>

        <ul class="nav-links">
          <li><a href="./">КАТАЛОГ</a></li>
          <li><a href="my-results.html">МОЇ РЕЗУЛЬТАТИ</a></li>
          <li><a href="leaderboard.html" class="active">РЕЙТИНГ</a></li>
          <li><a href="results.html">ДЛЯ ВЧИТЕЛЯ</a></li>
        </ul>

        <div id="authArea" class="nav-user"></div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container">

    <!-- Hero section -->
    <section class="hero">
      <div class="hero-eyebrow">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span class="sys-label mag">LEADERBOARD // TOP PLAYERS</span>
      </div>
      <h1 class="hero-title">
        <span class="holo-text">РЕЙТИНГ</span>
      </h1>
    </section>

    <!-- Content area (filled by JS) -->
    <div id="content">
      <p style="text-align:center; color:var(--text); padding:60px 20px;">Завантаження рейтингу...</p>
    </div>

    <!-- System bar -->
    <div class="system-bar">
      <div class="sys-status">
        <div class="live-dot"></div>
        <span>LEADERBOARD // LIVE RANKINGS</span>
      </div>
      <div class="sys-right">
        <span>ALGEBRA.SYS V2.0</span>
        <span class="sys-label lime">10-А</span>
      </div>
    </div>

  </div><!-- /container -->

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script>
  lucide.createIcons();

  window.addEventListener('load', async () => {
    const content = document.getElementById('content');
    const currentUser = Auth.getUser();

    // Render nav auth area
    const authArea = document.getElementById('authArea');
    if (currentUser) {
      authArea.innerHTML = `
        <div class="nav-avatar">${(currentUser.name||'U')[0].toUpperCase()}</div>
        <div class="nav-username">${currentUser.name}<span>${currentUser.email||''}</span></div>
        <button onclick="Auth.signOut()" style="background:none;border:1px solid rgba(255,0,170,0.3);color:var(--magenta);padding:4px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.7em;letter-spacing:0.1em;">✕ ВИЙТИ</button>`;
    }

    const allResults = await API.getResults();
    const leaderboard = buildLeaderboard(allResults);

    if (leaderboard.length === 0) {
      content.innerHTML = `
        <div class="card" style="text-align:center; padding:60px 20px;">
          <div style="font-size:3em; margin-bottom:16px;">🏆</div>
          <div style="font-family:'Russo One',sans-serif; font-size:1.1em; color:var(--text-bright); margin-bottom:8px;">
            ПОКИ ЩО ТУТ ПОРОЖНЬО
          </div>
          <div style="font-size:0.8em; color:var(--text); letter-spacing:0.08em;">
            Стань першим, хто пройде квіз!
          </div>
        </div>
      `;
      lucide.createIcons();
      return;
    }

    let html = '';

    // Podium section
    if (leaderboard.length >= 1) {
      const top3 = leaderboard.slice(0, 3);
      // Colors: 1st=lime, 2nd=cyan, 3rd=magenta
      const podiumColors   = ['var(--lime)', 'var(--cyan)', 'var(--magenta)'];
      const podiumBg       = ['rgba(179,255,0,0.08)', 'rgba(0,255,238,0.08)', 'rgba(255,0,170,0.08)'];
      const podiumBorder   = ['rgba(179,255,0,0.35)', 'rgba(0,255,238,0.35)', 'rgba(255,0,170,0.35)'];
      const podiumGlow     = ['rgba(179,255,0,0.3)', 'rgba(0,255,238,0.3)', 'rgba(255,0,170,0.3)'];
      const medals         = ['🥇', '🥈', '🥉'];
      const podiumHeights  = ['200px', '160px', '130px'];
      // Display order: 2nd, 1st, 3rd
      const podiumOrder = top3.length >= 3 ? [1, 0, 2] : top3.length >= 2 ? [1, 0] : [0];

      html += `
        <div class="section-divider">
          <div class="line"></div>
          <div class="title"><span class="holo-text">ПРИЗЕРИ</span></div>
          <div class="line"></div>
        </div>
        <div style="display:flex; justify-content:center; align-items:flex-end; gap:16px; margin-bottom:40px; flex-wrap:wrap;">
      `;

      podiumOrder.forEach(i => {
        if (!top3[i]) return;
        const s = top3[i];
        const color  = podiumColors[i];
        const bg     = podiumBg[i];
        const border = podiumBorder[i];
        const glow   = podiumGlow[i];
        const height = podiumHeights[i];

        const avatarHtml = s.picture
          ? `<img src="${s.picture}" referrerpolicy="no-referrer" onerror="this.style.display='none'"
               style="width:60px;height:60px;border-radius:50%;border:2px solid ${color};margin:0 auto 12px;display:block;">`
          : `<div style="width:60px;height:60px;border-radius:50%;border:2px solid ${color};margin:0 auto 12px;
               background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;
               font-family:'Russo One',sans-serif;font-size:1.4em;color:${color};">${s.name[0]}</div>`;

        html += `
          <div style="text-align:center; background:${bg}; border:1px solid ${border};
                      clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
                      padding:20px 16px; min-width:130px; min-height:${height};
                      display:flex; flex-direction:column; justify-content:flex-end;
                      box-shadow:0 0 20px ${glow}; transition:transform 0.3s;"
               onmouseover="this.style.transform='translateY(-6px)'"
               onmouseout="this.style.transform='translateY(0)'">
            <span style="font-size:2.2em; display:block; margin-bottom:12px;">${medals[i]}</span>
            ${avatarHtml}
            <div style="font-family:'Russo One',sans-serif; font-size:0.9em; color:var(--text-bright); margin-bottom:4px;">
              ${s.name}
            </div>
            <div style="font-family:'Russo One',sans-serif; font-size:1.2em; color:${color};
                        text-shadow:0 0 10px ${color};">
              ${s.avgScore}%
            </div>
          </div>
        `;
      });

      html += '</div>';
    }

    // Full leaderboard list
    html += `
      <div class="section-divider">
        <div class="line"></div>
        <div class="title"><span class="holo-text">ТАБЛИЦЯ ЛІДЕРІВ</span></div>
        <div class="line"></div>
      </div>
      <div class="card">
    `;

    leaderboard.forEach((s, i) => {
      const isMe = currentUser && currentUser.email && s.email.toLowerCase() === currentUser.email.toLowerCase();
      // Rank color: 1st=lime, 2nd=cyan, 3rd=magenta, rest=text
      const rankColor = i === 0 ? 'var(--lime)' : i === 1 ? 'var(--cyan)' : i === 2 ? 'var(--magenta)' : 'var(--text)';
      const rankBg    = i === 0 ? 'rgba(179,255,0,0.1)' : i === 1 ? 'rgba(0,255,238,0.1)' : i === 2 ? 'rgba(255,0,170,0.1)' : 'rgba(255,255,255,0.03)';
      const rankGlow  = i === 0 ? 'var(--lime)' : i === 1 ? 'var(--cyan)' : i === 2 ? 'var(--magenta)' : null;
      const rankShadow = rankGlow ? `text-shadow:0 0 8px ${rankGlow};` : '';

      const avatarHtml = s.picture
        ? `<img src="${s.picture}" referrerpolicy="no-referrer"
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect fill=%22%23334%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22%23888%22 font-size=%2216%22>${s.name[0]}</text></svg>'"
             style="width:40px;height:40px;border-radius:50%;border:2px solid var(--border-c);flex-shrink:0;">`
        : `<div style="width:40px;height:40px;border-radius:50%;border:2px solid var(--border-c);
             background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;
             font-family:'Russo One',sans-serif;color:var(--text);flex-shrink:0;">${s.name[0]}</div>`;

      const meStyle = isMe
        ? `background:rgba(119,0,255,0.06); border:1px solid rgba(119,0,255,0.25);
           clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
           padding:12px; margin:4px -12px;`
        : '';

      html += `
        <div style="display:flex; align-items:center; gap:16px; padding:14px 0;
                    border-bottom:1px solid var(--border-c); ${meStyle}">
          <div style="width:36px; height:36px; background:${rankBg}; border:1px solid ${rankColor};
                      clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
                      display:flex; align-items:center; justify-content:center;
                      font-family:'Russo One',sans-serif; font-size:0.85em; color:${rankColor};
                      ${rankShadow} flex-shrink:0;">
            ${i + 1}
          </div>
          ${avatarHtml}
          <div style="flex:1;">
            <div style="font-family:'Russo One',sans-serif; font-size:0.95em; color:var(--text-bright);">
              ${s.name}${isMe ? ' <span style="font-size:0.75em; color:var(--purple);">(це ти)</span>' : ''}
            </div>
            <div style="font-size:0.72em; color:var(--text); letter-spacing:0.06em; margin-top:2px;">
              ${s.quizCount} квізів · ${s.totalAttempts} спроб
            </div>
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <div style="font-family:'Russo One',sans-serif; font-size:1.3em; color:${rankColor}; ${rankShadow} line-height:1;">
              ${s.avgScore}%
            </div>
            <div style="font-size:0.65em; color:var(--text); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;">
              СЕРЕДНІЙ
            </div>
          </div>
        </div>
      `;
    });

    html += '</div>';

    content.innerHTML = html;
    lucide.createIcons();
  });
  </script>
</body>
</html>
